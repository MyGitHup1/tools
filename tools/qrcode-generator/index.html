<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二维码生成器 QR Code Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        .qr-container canvas { border-radius: 12px; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.35s ease-out; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">
    <div class="max-w-xl mx-auto">
        <a href="../../index.html" class="inline-flex items-center text-blue-500 hover:text-blue-700 mb-4 transition-colors">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
            返回工具首页
        </a>

        <div class="bg-white rounded-xl shadow-lg p-6 md:p-8">
            <h1 class="text-2xl md:text-3xl font-bold text-center text-gray-800 mb-6 flex items-center justify-center gap-2">
                <svg class="w-8 h-8 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v1m6 11h2m-6 0h-2.48a2.5 2.5 0 00-4.52 0H4m16 0v-4a2 2 0 00-2-2h-1.5m2 6H20M4 15v-4a2 2 0 012-2h1.5M4 15h1.5M12 9v4m-4-6h8M8 3v2m8-2v2"/>
                </svg>
                二维码生成器
            </h1>

            <!-- 输入区 -->
            <div class="mb-5">
                <label class="block text-sm font-medium text-gray-600 mb-2">输入文字或链接</label>
                <textarea id="qrInput" rows="3" placeholder="输入文字、网址、邮箱、电话号码...&#10;例如：https://wuleiblog.top 或 你好世界"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm resize-none focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 outline-none transition-all"></textarea>
            </div>

            <!-- 选项区 -->
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-5">
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">尺寸</label>
                    <select id="qrSize" class="w-full px-2 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-400 outline-none">
                        <option value="200">200px</option>
                        <option value="256" selected>256px</option>
                        <option value="320">320px</option>
                        <option value="400">400px</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">颜色</label>
                    <input type="color" id="qrColor" value="#1e1e1e" class="w-full h-10 rounded-lg border border-gray-300 cursor-pointer">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">纠错级别</label>
                    <select id="qrLevel" class="w-full px-2 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-400 outline-none">
                        <option value="L">L - 7%</option>
                        <option value="M" selected>M - 15%</option>
                        <option value="Q">Q - 25%</option>
                        <option value="H">H - 30%</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">背景</label>
                    <input type="color" id="qrBg" value="#ffffff" class="w-full h-10 rounded-lg border border-gray-300 cursor-pointer">
                </div>
            </div>

            <!-- 生成按钮 -->
            <button id="generateBtn" class="w-full py-3 bg-indigo-500 hover:bg-indigo-600 text-white font-medium rounded-xl transition-colors mb-6">
                生成二维码
            </button>

            <!-- 二维码显示区 -->
            <div id="qrResult" class="hidden animate-slide-up">
                <div class="flex justify-center mb-4 p-4 bg-gray-50 rounded-xl">
                    <div id="qrCanvas" class="qr-container"></div>
                </div>
                <div class="flex gap-3">
                    <button id="downloadBtn" class="flex-1 py-2.5 bg-green-500 hover:bg-green-600 text-white font-medium rounded-xl transition-colors text-sm flex items-center justify-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                        </svg>
                        下载 PNG
                    </button>
                    <button id="shareBtn" class="flex-1 py-2.5 bg-blue-500 hover:bg-blue-600 text-white font-medium rounded-xl transition-colors text-sm flex items-center justify-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
                        </svg>
                        复制图片
                    </button>
                </div>
                <p class="text-center text-xs text-gray-400 mt-3" id="qrInfo"></p>
            </div>

            <!-- 快捷模板 -->
            <div class="mt-6 pt-5 border-t border-gray-200">
                <p class="text-xs font-medium text-gray-500 mb-2">快捷模板</p>
                <div class="flex flex-wrap gap-2">
                    <button class="quick-btn text-xs px-3 py-1.5 bg-gray-100 hover:bg-indigo-50 hover:text-indigo-600 rounded-full transition-colors" data-type="url">🔗 网址</button>
                    <button class="quick-btn text-xs px-3 py-1.5 bg-gray-100 hover:bg-indigo-50 hover:text-indigo-600 rounded-full transition-colors" data-type="wifi">📶 Wi-Fi</button>
                    <button class="quick-btn text-xs px-3 py-1.5 bg-gray-100 hover:bg-indigo-50 hover:text-indigo-600 rounded-full transition-colors" data-type="email">📧 邮箱</button>
                    <button class="quick-btn text-xs px-3 py-1.5 bg-gray-100 hover:bg-indigo-50 hover:text-indigo-600 rounded-full transition-colors" data-type="phone">📞 电话</button>
                    <button class="quick-btn text-xs px-3 py-1.5 bg-gray-100 hover:bg-indigo-50 hover:text-indigo-600 rounded-full transition-colors" data-type="sms">💬 短信</button>
                    <button class="quick-btn text-xs px-3 py-1.5 bg-gray-100 hover:bg-indigo-50 hover:text-indigo-600 rounded-full transition-colors" data-type="vcard">👤 名片</button>
                </div>
            </div>

            <!-- 模板弹窗 -->
            <div id="templateModal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4">
                <div class="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm animate-slide-up">
                    <h3 class="text-lg font-semibold mb-4" id="modalTitle">模板</h3>
                    <div id="modalBody"></div>
                    <div class="flex gap-3 mt-4">
                        <button id="modalConfirm" class="flex-1 py-2 bg-indigo-500 text-white rounded-lg text-sm hover:bg-indigo-600">生成</button>
                        <button id="modalCancel" class="flex-1 py-2 bg-gray-200 text-gray-700 rounded-lg text-sm hover:bg-gray-300">取消</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const qrInput = document.getElementById('qrInput');
        const qrSize = document.getElementById('qrSize');
        const qrColor = document.getElementById('qrColor');
        const qrBg = document.getElementById('qrBg');
        const qrLevel = document.getElementById('qrLevel');
        const generateBtn = document.getElementById('generateBtn');
        const qrResult = document.getElementById('qrResult');
        const qrCanvas = document.getElementById('qrCanvas');
        const qrInfo = document.getElementById('qrInfo');
        const downloadBtn = document.getElementById('downloadBtn');
        const shareBtn = document.getElementById('shareBtn');
        const modal = document.getElementById('templateModal');

        let currentCanvas = null;
        let currentText = '';

        function generateQR() {
            const text = qrInput.value.trim();
            if (!text) return;

            currentText = text;
            qrCanvas.innerHTML = '';

            if (typeof QRCode === 'undefined') {
                qrInfo.textContent = '⚠️ 二维码库加载失败，请刷新页面重试';
                qrInfo.className = 'text-center text-xs text-red-500 mt-3';
                qrResult.classList.remove('hidden');
                return;
            }

            const size = parseInt(qrSize.value);
            try {
                const qr = new QRCode(qrCanvas, {
                    text: text,
                    width: size,
                    height: size,
                    colorDark: qrColor.value,
                    colorLight: qrBg.value,
                    correctLevel: QRCode.CorrectLevel[qrLevel.value]
                });
                qrResult.classList.remove('hidden');
                // 拿到 canvas 引用用于下载
                setTimeout(() => {
                    const canvas = qrCanvas.querySelector('canvas');
                    if (canvas) {
                        canvas.style.maxWidth = '100%';
                        canvas.style.height = 'auto';
                        currentCanvas = canvas;
                    }
                }, 100);
                qrInfo.textContent = `二维码内容：${text.length > 50 ? text.slice(0, 50) + '...' : text}（${text.length} 字符）`;
                qrInfo.className = 'text-center text-xs text-gray-400 mt-3';
            } catch (e) {
                qrInfo.textContent = '生成失败：' + e.message;
                qrInfo.className = 'text-center text-xs text-red-500 mt-3';
            }
        }

        generateBtn.addEventListener('click', generateQR);
        qrInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); generateQR(); }
        });

        // 实时生成防抖
        let debounceTimer;
        [qrInput, qrSize, qrColor, qrBg, qrLevel].forEach(el => {
            el.addEventListener('input', () => {
                clearTimeout(debounceTimer);
                if (qrInput.value.trim()) debounceTimer = setTimeout(generateQR, 400);
            });
            el.addEventListener('change', () => {
                if (qrInput.value.trim()) generateQR();
            });
        });

        // 下载
        downloadBtn.addEventListener('click', () => {
            if (!currentCanvas) return;
            const link = document.createElement('a');
            link.download = 'qrcode.png';
            link.href = currentCanvas.toDataURL('image/png');
            link.click();
        });

        // 复制图片
        shareBtn.addEventListener('click', async () => {
            if (!currentCanvas) return;
            try {
                currentCanvas.toBlob(async (blob) => {
                    await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
                    const orig = shareBtn.innerHTML;
                    shareBtn.innerHTML = '✅ 已复制';
                    shareBtn.classList.add('bg-green-500');
                    setTimeout(() => { shareBtn.innerHTML = orig; shareBtn.classList.remove('bg-green-500'); }, 1500);
                });
            } catch {
                const link = document.createElement('a');
                link.download = 'qrcode.png';
                link.href = currentCanvas.toDataURL('image/png');
                link.click();
            }
        });

        // 快捷模板
        const templates = {
            url: { title: '生成网址二维码', fields: [{ label: '网址', value: 'https://', placeholder: 'https://example.com' }], format: v => v[0] },
            wifi: {
                title: '生成 Wi-Fi 二维码',
                fields: [
                    { label: 'SSID (Wi-Fi名)', value: '', placeholder: 'MyWiFi' },
                    { label: '密码', value: '', placeholder: 'password' },
                    { label: '加密方式', value: 'WPA', type: 'select', options: ['WPA', 'WEP', 'nopass'] }
                ],
                format: v => `WIFI:T:${v[2]};S:${v[0]};P:${v[1]};;`
            },
            email: { title: '生成邮箱二维码', fields: [{ label: '邮箱地址', value: '', placeholder: 'hello@example.com' }], format: v => `mailto:${v[0]}` },
            phone: { title: '生成电话二维码', fields: [{ label: '电话号码', value: '', placeholder: '+8613800138000' }], format: v => `tel:${v[0]}` },
            sms: {
                title: '生成短信二维码',
                fields: [
                    { label: '手机号', value: '', placeholder: '+8613800138000' },
                    { label: '短信内容', value: '', placeholder: '你好！' }
                ],
                format: v => `smsto:${v[0]}:${v[1]}`
            },
            vcard: {
                title: '生成名片二维码',
                fields: [
                    { label: '姓名', value: '', placeholder: '张三' },
                    { label: '手机', value: '', placeholder: '+8613800138000' },
                    { label: '邮箱', value: '', placeholder: 'zhangsan@example.com' },
                    { label: '公司', value: '', placeholder: 'XX公司' }
                ],
                format: v => `BEGIN:VCARD\nVERSION:3.0\nFN:${v[0]}\nTEL:${v[1]}\nEMAIL:${v[2]}\nORG:${v[3]}\nEND:VCARD`
            }
        };

        document.querySelectorAll('.quick-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const type = btn.dataset.type;
                const tpl = templates[type];
                document.getElementById('modalTitle').textContent = tpl.title;
                document.getElementById('modalBody').innerHTML = tpl.fields.map((f, i) => `
                    <div class="mb-3">
                        <label class="block text-xs font-medium text-gray-500 mb-1">${f.label}</label>
                        ${f.type === 'select' ? `<select data-field="${i}" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">${f.options.map(o => `<option ${o === f.value ? 'selected' : ''}>${o}</option>`).join('')}</select>`
                        : `<input data-field="${i}" type="text" value="${f.value}" placeholder="${f.placeholder}" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-400 outline-none">`}
                    </div>
                `).join('');
                document.getElementById('modalConfirm').onclick = () => {
                    const values = Array.from(document.querySelectorAll('[data-field]')).map(el => el.value);
                    qrInput.value = tpl.format(values);
                    modal.classList.add('hidden');
                    generateQR();
                };
                document.getElementById('modalCancel').onclick = () => modal.classList.add('hidden');
                modal.classList.remove('hidden');
            });
        });

        modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.add('hidden'); });

        // 初始示例
        qrInput.value = 'https://wuleiblog.top';
        generateQR();
    </script>
</body>
</html>
