<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOM 整理工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'slide-up': 'slideUp 0.3s ease-out',
                        'spin-slow': 'spin 2s linear infinite',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(12px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                    },
                },
            },
        }
    </script>
    <style>
        .cat-chip { transition: all 0.2s; }
        .cat-chip:hover { transform: translateY(-1px); }
        .sortable-header { cursor: pointer; user-select: none; transition: background 0.15s; }
        .sortable-header:hover { background: #374151; }
        .sort-arrow { display: inline-block; width: 0; height: 0; margin-left: 4px; vertical-align: middle; border-left: 5px solid transparent; border-right: 5px solid transparent; }
        .sort-asc { border-bottom: 6px solid #60a5fa; border-top: none; }
        .sort-desc { border-top: 6px solid #60a5fa; border-bottom: none; }
        .bom-table tbody tr { transition: background 0.15s; }
        .bom-table tbody tr:hover { background: #1f2937 !important; }
        .tab-btn.active { background: #1f2937; color: #60a5fa; border-bottom: 2px solid #60a5fa; }
    </style>
</head>
<body class="bg-gray-950 min-h-screen text-gray-200 p-4 md:p-6">
    <div class="max-w-7xl mx-auto">
        <!-- 返回首页 -->
        <a href="../../index.html" class="inline-flex items-center text-blue-400 hover:text-blue-300 mb-4 transition-colors text-sm">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
            返回工具首页
        </a>

        <!-- 标题 -->
        <div class="flex items-center gap-3 mb-6 animate-fade-in">
            <div class="w-12 h-12 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-cyan-500/20">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"/>
                </svg>
            </div>
            <div>
                <h1 class="text-2xl md:text-3xl font-bold text-white">BOM 整理工具</h1>
                <p class="text-gray-400 text-sm">粘贴物料清单 → 自动分类排序 → 预览导出</p>
            </div>
        </div>

        <!-- ===== 输入区 ===== -->
        <div class="bg-gray-900 border border-gray-700 rounded-xl p-4 md:p-6 mb-4 animate-fade-in">
            <div class="flex items-center justify-between mb-3 flex-wrap gap-2">
                <label class="text-sm font-semibold text-gray-300 flex items-center gap-2">
                    <svg class="w-4 h-4 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                    </svg>
                    粘贴 BOM 数据
                </label>
                <div class="flex gap-2 flex-wrap">
                    <button onclick="loadSample()" class="text-xs px-3 py-1.5 bg-gray-800 hover:bg-gray-700 text-gray-300 rounded-lg border border-gray-600 transition-colors">
                        📋 加载示例数据
                    </button>
                    <button onclick="parseBOM()" class="text-xs px-3 py-1.5 bg-cyan-600 hover:bg-cyan-500 text-white rounded-lg font-medium transition-colors">
                        🔍 解析
                    </button>
                </div>
            </div>

            <div class="flex gap-2 mb-3 flex-wrap">
                <span class="text-xs text-gray-500">分隔符：</span>
                <button class="sep-btn active tab-btn text-xs px-2.5 py-1 rounded-md border border-gray-600 transition-colors" data-sep="tab" onclick="setSeparator('tab', this)">Tab</button>
                <button class="sep-btn text-xs px-2.5 py-1 rounded-md border border-gray-600 text-gray-400 hover:text-gray-200 transition-colors" data-sep="comma" onclick="setSeparator('comma', this)">逗号</button>
                <button class="sep-btn text-xs px-2.5 py-1 rounded-md border border-gray-600 text-gray-400 hover:text-gray-200 transition-colors" data-sep="pipe" onclick="setSeparator('pipe', this)">竖线 |</button>
                <button class="sep-btn text-xs px-2.5 py-1 rounded-md border border-gray-600 text-gray-400 hover:text-gray-200 transition-colors" data-sep="semicolon" onclick="setSeparator('semicolon', this)">分号 ;</button>
                <button class="sep-btn text-xs px-2.5 py-1 rounded-md border border-gray-600 text-gray-400 hover:text-gray-200 transition-colors" data-sep="auto" onclick="setSeparator('auto', this)">自动</button>
            </div>

            <textarea id="bomInput" rows="10"
                class="w-full bg-gray-800 border border-gray-600 rounded-lg p-4 text-sm font-mono text-gray-200 focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 outline-none resize-y transition-all"
                placeholder="粘贴 BOM 数据，支持 Tab/逗号/竖线分隔，第一行为表头...&#10;&#10;示例格式：&#10;位号	物料名称	规格	封装	数量	备注&#10;R1,R2,R3	贴片电阻	10kΩ ±1%	0805	3	限流&#10;C1,C2	MLCC	100nF 50V	0603	2	去耦"></textarea>

            <div class="flex items-center gap-4 flex-wrap mt-2">
                <label class="flex items-center gap-1.5 text-xs text-gray-400 cursor-pointer">
                    <input type="checkbox" id="firstRowHeader" checked class="rounded bg-gray-700 border-gray-600 text-cyan-500 focus:ring-cyan-500">
                    首行为表头
                </label>
                <label class="flex items-center gap-1.5 text-xs text-gray-400 cursor-pointer">
                    <input type="checkbox" id="autoCategory" checked class="rounded bg-gray-700 border-gray-600 text-cyan-500 focus:ring-cyan-500">
                    自动分类
                </label>
                <span id="parseStatus" class="text-xs text-gray-500"></span>
            </div>
        </div>

        <!-- ===== 结果区 ===== -->
        <div id="resultArea" class="hidden animate-slide-up">

            <!-- 统计卡片 -->
            <div id="statsRow" class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-4"></div>

            <!-- 分类筛选 -->
            <div class="bg-gray-900 border border-gray-700 rounded-xl p-4 mb-4">
                <div class="flex items-center gap-2 mb-2">
                    <svg class="w-4 h-4 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/>
                    </svg>
                    <span class="text-sm font-semibold text-gray-300">分类筛选</span>
                    <span class="text-xs text-gray-500 ml-2">点击分类高亮对应行</span>
                </div>
                <div id="categoryFilters" class="flex gap-2 flex-wrap"></div>
            </div>

            <!-- 表格工具栏 -->
            <div class="flex items-center justify-between mb-3 flex-wrap gap-2">
                <div class="flex gap-2">
                    <button onclick="exportCSV()" class="flex items-center gap-1.5 px-4 py-2 bg-green-600 hover:bg-green-500 text-white text-sm font-medium rounded-lg transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                        </svg>
                        导出 CSV
                    </button>
                    <button onclick="exportExcel()" class="flex items-center gap-1.5 px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium rounded-lg transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                        </svg>
                        导出 Excel
                    </button>
                    <button onclick="copyTable()" class="flex items-center gap-1.5 px-3 py-2 bg-gray-700 hover:bg-gray-600 text-gray-200 text-sm rounded-lg transition-colors border border-gray-600">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                        </svg>
                        复制表格
                    </button>
                </div>
                <div class="flex gap-2 items-center">
                    <span class="text-xs text-gray-500">排序：</span>
                    <select id="sortKey" onchange="reSort()" class="bg-gray-800 border border-gray-600 rounded-lg text-xs text-gray-300 px-2 py-1.5 focus:ring-1 focus:ring-cyan-500 outline-none">
                        <option value="category">按分类</option>
                        <option value="ref">按位号</option>
                        <option value="name">按名称</option>
                        <option value="qty">按数量↓</option>
                    </select>
                    <button onclick="toggleSortOrder()" id="sortOrderBtn" class="p-1.5 bg-gray-800 border border-gray-600 rounded-lg hover:bg-gray-700 transition-colors" title="切换升降序">
                        <svg id="sortAscIcon" class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4h13M3 8h9m-9 4h6m4 0l4-4m0 0l4 4m-4-4v12"/>
                        </svg>
                        <svg id="sortDescIcon" class="w-4 h-4 text-gray-400 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4h13M3 8h9m-9 4h9m5-4v12m0 0l-4-4m4 4l4-4"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- 表格 -->
            <div class="bg-gray-900 border border-gray-700 rounded-xl overflow-hidden shadow-xl">
                <div class="overflow-x-auto max-h-[60vh] overflow-y-auto">
                    <table class="bom-table w-full text-sm" id="bomTable">
                        <thead class="sticky top-0 z-10"></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <div id="rowCount" class="text-xs text-gray-500 mt-2 text-right"></div>
        </div>

        <!-- 空状态 -->
        <div id="emptyState" class="text-center py-16 animate-fade-in">
            <svg class="w-16 h-16 mx-auto text-gray-700 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"/>
            </svg>
            <p class="text-gray-600">粘贴 BOM 数据后点击"解析"</p>
        </div>
    </div>

    <script>
        // ==================== 全局状态 ====================
        let bomData = [];           // 解析后的数据行
        let headers = [];           // 列头
        let categories = [];       // 每行的分类
        let categorySet = new Set();
        let activeFilter = null;
        let separator = 'tab';
        let sortAsc = true;
        let currentSortKey = 'category';

        // ==================== 分隔符 ====================
        function setSeparator(sep, btn) {
            separator = sep;
            document.querySelectorAll('.sep-btn').forEach(b => {
                b.classList.remove('active', 'bg-gray-800', 'text-cyan-400', 'border-cyan-500');
                b.classList.add('text-gray-400', 'border-gray-600');
            });
            btn.classList.add('active', 'bg-gray-800', 'text-cyan-400', 'border-cyan-500');
        }

        function getSepRegex() {
            switch (separator) {
                case 'comma': return /,(?=(?:[^"]*"[^"]*")*[^"]*$)/;
                case 'pipe': return /\|/;
                case 'semicolon': return /;(?=(?:[^"]*"[^"]*")*[^"]*$)/;
                case 'tab': return /\t/;
                case 'auto': return null;
                default: return /\t/;
            }
        }

        function detectSeparator(text) {
            const lines = text.trim().split('\n').filter(l => l.trim());
            if (lines.length < 2) return '\t';
            const firstLine = lines[0];
            const counts = {
                '\t': (firstLine.match(/\t/g) || []).length,
                ',': (firstLine.match(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/g) || []).length,
                '|': (firstLine.match(/\|/g) || []).length,
                ';': (firstLine.match(/;(?=(?:[^"]*"[^"]*")*[^"]*$)/g) || []).length,
            };
            const best = Object.entries(counts).sort((a, b) => b[1] - a[1])[0];
            return best[1] > 0 ? best[0] : '\t';
        }

        // ==================== 物料分类引擎 ====================
        function classifyItem(name, ref, spec) {
            const combined = (name + ' ' + ref + ' ' + spec).toLowerCase();

            // 按优先级匹配
            const rules = [
                { cat: '电阻', kw: ['电阻', 'resistor', 'res', 'r\\d'], exclude: ['电容', '阻容'] },
                { cat: '排阻', kw: ['排阻', '网络电阻', 'rn\\d', 'rp\\d'] },
                { cat: '电容', kw: ['电容', 'capacitor', 'cap', 'mlcc', '电解', '钽电容', 'c\\d'], exclude: ['电阻', '排阻'] },
                { cat: '电感/磁珠', kw: ['电感', '磁珠', 'inductor', 'bead', 'l\\d', '变压器', 'transformer'] },
                { cat: '二极管', kw: ['二极管', 'diode', 'd\\d', 'tvs', '稳压管', 'zener', '肖特基', 'schottky', '发光二极管', 'led'] },
                { cat: '三极管/MOSFET', kw: ['三极管', 'mosfet', 'mos', 'transistor', 'q\\d', 'igbt', 'bjt', 'fet', '晶闸管', 'scr', 'triac'] },
                { cat: 'IC/芯片', kw: ['ic', '芯片', '集成电路', 'mcu', 'cpu', 'fpga', 'dsp', 'soc', 'u\\d', '运放', 'op.?amp', '比较器', 'comparator', 'ldo', 'dc.?dc', '稳压', 'regulator', 'adc', 'dac', '驱动'] },
                { cat: '连接器', kw: ['连接器', 'connector', '排针', '排母', '插座', '插头', '端子', 'header', 'j\\d', 'usb', 'rj45', 'fpc', 'ffc', '接插件'] },
                { cat: '晶振/振荡器', kw: ['晶振', 'crystal', 'oscillator', '振荡器', 'y\\d', 'x\\d', '谐振器', 'resonator'] },
                { cat: '开关/按键', kw: ['开关', 'switch', '按键', 'button', 'sw\\d', 'key', '拨码', 'dip', '轻触', 'tactile'] },
                { cat: '继电器', kw: ['继电器', 'relay', 'k\\d'] },
                { cat: '保险丝', kw: ['保险丝', 'fuse', 'f\\d', '熔断', 'ptc', '自恢复'] },
                { cat: '传感器', kw: ['传感器', 'sensor', 'ntc', 'ptc', '热电偶', '温度传感', '湿度', '压力'] },
                { cat: 'PCB/基板', kw: ['pcb', '电路板', '基板'] },
                { cat: '散热器', kw: ['散热', 'heatsink', 'heat.?sink', 'thermal'] },
                { cat: '线材/电缆', kw: ['线', '电缆', 'cable', '排线', '导线', '飞线', 'wire'] },
                { cat: '螺丝/紧固件', kw: ['螺丝', '螺母', '螺柱', '垫圈', 'screw', 'nut', 'washer', '铜柱', 'standoff'] },
                { cat: '跳线/短接', kw: ['跳线', 'jumper', '短接', 'jp\\d', '0欧', '零欧'] },
                { cat: '其他', kw: [] },
            ];

            for (const rule of rules) {
                if (rule.kw.length === 0) continue;
                for (const kw of rule.kw) {
                    const regex = new RegExp('\\b' + kw + '\\b', 'i');
                    if (regex.test(combined)) {
                        if (rule.exclude && rule.exclude.some(e => new RegExp(e, 'i').test(combined))) continue;
                        return rule.cat;
                    }
                }
            }
            return '其他';
        }

        // ==================== 解析逻辑 ====================
        function parseBOM() {
            const text = bomInput.value.trim();
            if (!text) {
                document.getElementById('parseStatus').textContent = '请先粘贴数据';
                document.getElementById('parseStatus').className = 'text-xs text-red-400';
                return;
            }

            const useHeader = document.getElementById('firstRowHeader').checked;
            const autoCat = document.getElementById('autoCategory').checked;

            let sepRegex;
            if (separator === 'auto') {
                const detected = detectSeparator(text);
                sepRegex = detected === '\t' ? /\t/ :
                    detected === ',' ? /,(?=(?:[^"]*"[^"]*")*[^"]*$)/ :
                    detected === '|' ? /\|/ :
                    detected === ';' ? /;(?=(?:[^"]*"[^"]*")*[^"]*$)/ : /\t/;
                document.getElementById('parseStatus').textContent = '自动检测分隔符: ' + (detected === '\t' ? 'Tab' : detected);
                document.getElementById('parseStatus').className = 'text-xs text-cyan-400';
            } else {
                sepRegex = getSepRegex();
                document.getElementById('parseStatus').textContent = '';
            }

            const lines = text.trim().split('\n').filter(l => l.trim());
            if (lines.length === 0) {
                document.getElementById('parseStatus').textContent = '无有效数据行';
                document.getElementById('parseStatus').className = 'text-xs text-red-400';
                return;
            }

            // 解析首行
            const firstCells = lines[0].split(sepRegex).map(c => c.replace(/^"|"$/g, '').trim());

            let startIdx;
            if (useHeader) {
                headers = firstCells;
                startIdx = 1;
            } else {
                headers = firstCells.map((_, i) => `列${i + 1}`);
                startIdx = 0;
            }

            // 解析数据行
            bomData = [];
            categories = [];
            categorySet = new Set();

            for (let i = startIdx; i < lines.length; i++) {
                const cells = lines[i].split(sepRegex).map(c => c.replace(/^"|"$/g, '').trim());
                // 补齐到 header 长度
                while (cells.length < headers.length) cells.push('');
                const row = {};
                headers.forEach((h, j) => { row[h] = cells[j] || ''; });
                bomData.push(row);
            }

            if (bomData.length === 0) {
                document.getElementById('parseStatus').textContent = '未解析到数据行';
                document.getElementById('parseStatus').className = 'text-xs text-red-400';
                return;
            }

            // 自动分类
            if (autoCat) {
                if (!headers.includes('分类')) {
                    headers.push('分类');
                }
                bomData.forEach(row => {
                    const ref = headers.find(h => /位号|编号|ref|designator/i.test(h));
                    const name = headers.find(h => /名称|物料|name|part|描述|desc/i.test(h));
                    const spec = headers.find(h => /规格|型号|spec|参数/i.test(h));
                    const cat = classifyItem(
                        row[name || headers[1]] || '',
                        row[ref || headers[0]] || '',
                        row[spec || headers[2]] || ''
                    );
                    row['分类'] = cat;
                    categories.push(cat);
                    categorySet.add(cat);
                });
            } else {
                categories = bomData.map(() => '');
            }

            activeFilter = null;
            renderAll();
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('resultArea').classList.remove('hidden');
            document.getElementById('parseStatus').textContent = `解析成功：${bomData.length} 行，${headers.length} 列`;
            document.getElementById('parseStatus').className = 'text-xs text-green-400';
        }

        // ==================== 排序 ====================
        function getSortValue(row, key) {
            switch (key) {
                case 'category': return (row['分类'] || '其他');
                case 'ref': {
                    const refCol = headers.find(h => /位号|编号|ref|designator/i.test(h));
                    const ref = row[refCol] || '';
                    const m = ref.match(/[A-Za-z]+(\d+)/);
                    return m ? parseInt(m[1]) : ref;
                }
                case 'name': {
                    const nameCol = headers.find(h => /名称|物料|name|part/i.test(h));
                    return (row[nameCol] || '').toLowerCase();
                }
                case 'qty': {
                    const qtyCol = headers.find(h => /数量|qty|quantity/i.test(h));
                    return parseInt(row[qtyCol]) || 0;
                }
                default: return '';
            }
        }

        function reSort() {
            currentSortKey = document.getElementById('sortKey').value;
            doSort();
            renderTable();
        }

        function toggleSortOrder() {
            sortAsc = !sortAsc;
            document.getElementById('sortAscIcon').classList.toggle('hidden', !sortAsc);
            document.getElementById('sortDescIcon').classList.toggle('hidden', sortAsc);
            doSort();
            renderTable();
        }

        function doSort() {
            const key = currentSortKey;
            bomData.sort((a, b) => {
                const va = getSortValue(a, key);
                const vb = getSortValue(b, key);
                if (typeof va === 'number' && typeof vb === 'number') {
                    return sortAsc ? va - vb : vb - va;
                }
                const cmp = String(va).localeCompare(String(vb), 'zh-CN');
                return sortAsc ? cmp : -cmp;
            });
        }

        // ==================== 渲染 ====================
        function renderCategoryStats() {
            const stats = {};
            categorySet.forEach(c => { stats[c] = 0; });
            bomData.forEach(row => {
                const cat = row['分类'] || '其他';
                stats[cat] = (stats[cat] || 0) + 1;
            });

            // 统计总数
            let totalQty = 0;
            const qtyCol = headers.find(h => /数量|qty|quantity/i.test(h));
            if (qtyCol) {
                bomData.forEach(row => { totalQty += parseInt(row[qtyCol]) || 0; });
            }

            const catCount = Object.keys(stats).length;
            const parts = bomData.length;

            const cards = [
                { label: '物料种类', value: parts, icon: 'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2', color: 'from-cyan-500 to-blue-600' },
                { label: '分类数', value: catCount, icon: 'M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z', color: 'from-purple-500 to-indigo-600' },
                { label: '总数量', value: totalQty || '—', icon: 'M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z', color: 'from-emerald-500 to-green-600' },
                { label: '最多类别', value: Object.entries(stats).sort((a, b) => b[1] - a[1])[0]?.[0] || '—', icon: 'M13 7h8m0 0v8m0-8l-8 8-4-4-6 6', color: 'from-amber-500 to-orange-600' },
            ];

            document.getElementById('statsRow').innerHTML = cards.map(c => `
                <div class="bg-gray-900 border border-gray-700 rounded-xl p-3 flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br ${c.color} rounded-lg flex items-center justify-center shadow-lg shrink-0">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${c.icon}"/>
                        </svg>
                    </div>
                    <div>
                        <div class="text-xs text-gray-500">${c.label}</div>
                        <div class="text-lg font-bold text-white">${c.value}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderCategoryFilters() {
            const stats = {};
            categorySet.forEach(c => { stats[c] = 0; });
            bomData.forEach(row => {
                const cat = row['分类'] || '其他';
                stats[cat] = (stats[cat] || 0) + 1;
            });

            const sorted = Object.entries(stats).sort((a, b) => {
                if (a[0] === '其他') return 1;
                if (b[0] === '其他') return -1;
                return b[1] - a[1];
            });

            const colors = {
                '电阻': 'bg-red-900/50 text-red-300 border-red-700',
                '排阻': 'bg-red-900/50 text-red-300 border-red-700',
                '电容': 'bg-blue-900/50 text-blue-300 border-blue-700',
                '电感/磁珠': 'bg-green-900/50 text-green-300 border-green-700',
                '二极管': 'bg-yellow-900/50 text-yellow-300 border-yellow-700',
                '三极管/MOSFET': 'bg-purple-900/50 text-purple-300 border-purple-700',
                'IC/芯片': 'bg-cyan-900/50 text-cyan-300 border-cyan-700',
                '连接器': 'bg-orange-900/50 text-orange-300 border-orange-700',
                '晶振/振荡器': 'bg-pink-900/50 text-pink-300 border-pink-700',
                '开关/按键': 'bg-teal-900/50 text-teal-300 border-teal-700',
                '继电器': 'bg-indigo-900/50 text-indigo-300 border-indigo-700',
                '保险丝': 'bg-rose-900/50 text-rose-300 border-rose-700',
                '传感器': 'bg-lime-900/50 text-lime-300 border-lime-700',
                '散热器': 'bg-gray-700/50 text-gray-300 border-gray-600',
                '其他': 'bg-gray-800 text-gray-400 border-gray-600',
            };

            document.getElementById('categoryFilters').innerHTML = [
                `<button onclick="filterCategory(null)" class="cat-chip text-xs px-3 py-1.5 rounded-full border transition-all ${activeFilter === null ? 'bg-white/10 text-white border-white/30' : 'bg-gray-800 text-gray-400 border-gray-600 hover:border-gray-400'}">
                    全部 (${bomData.length})
                </button>`,
                ...sorted.map(([cat, count]) => `
                    <button onclick="filterCategory('${cat.replace(/'/g, "\\'")}')" class="cat-chip text-xs px-3 py-1.5 rounded-full border transition-all ${activeFilter === cat ? 'ring-2 ring-white/50 ' + (colors[cat] || colors['其他']).split(' ')[0].replace('/50', '') + ' ' + (colors[cat] || colors['其他']).split(' ').slice(1).join(' ') : (colors[cat] || colors['其他'])}">
                        ${cat} (${count})
                    </button>
                `)
            ].join('');
        }

        function filterCategory(cat) {
            activeFilter = cat;
            renderCategoryFilters();
            renderTable();
        }

        function renderTable() {
            // 先排序
            doSort();

            // 筛选
            let displayData = bomData;
            if (activeFilter) {
                displayData = bomData.filter(row => (row['分类'] || '其他') === activeFilter);
            }

            const thead = document.querySelector('#bomTable thead');
            const tbody = document.querySelector('#bomTable tbody');

            // 颜色映射
            const catColors = {
                '电阻': 'text-red-400',
                '排阻': 'text-red-400',
                '电容': 'text-blue-400',
                '电感/磁珠': 'text-green-400',
                '二极管': 'text-yellow-400',
                '三极管/MOSFET': 'text-purple-400',
                'IC/芯片': 'text-cyan-400',
                '连接器': 'text-orange-400',
                '晶振/振荡器': 'text-pink-400',
            };

            // 表头
            thead.innerHTML = `
                <tr class="bg-gray-800">
                    <th class="sortable-header px-4 py-2.5 text-left text-xs font-semibold text-gray-300 uppercase tracking-wider border-b border-gray-700">#</th>
                    ${headers.map(h => `
                        <th class="sortable-header px-4 py-2.5 text-left text-xs font-semibold text-gray-300 uppercase tracking-wider border-b border-gray-700 whitespace-nowrap">${h}</th>
                    `).join('')}
                </tr>
            `;

            // 表体
            tbody.innerHTML = displayData.map((row, i) => {
                const cat = row['分类'] || '其他';
                return `
                    <tr class="border-b border-gray-800 ${i % 2 === 0 ? 'bg-gray-900' : 'bg-gray-850'}" style="--bg: ${i % 2 === 0 ? '#111827' : '#161b22'}">
                        <td class="px-4 py-2 text-xs text-gray-600 font-mono">${i + 1}</td>
                        ${headers.map(h => {
                            const val = row[h] || '';
                            if (h === '分类') {
                                return `<td class="px-4 py-2 text-xs font-medium ${catColors[cat] || 'text-gray-300'}">${val}</td>`;
                            }
                            return `<td class="px-4 py-2 text-xs text-gray-300 max-w-xs truncate" title="${val.replace(/"/g, '&quot;')}">${val}</td>`;
                        }).join('')}
                    </tr>
                `;
            }).join('');

            document.getElementById('rowCount').textContent = `显示 ${displayData.length} / ${bomData.length} 行`;
        }

        function renderAll() {
            renderCategoryStats();
            renderCategoryFilters();
            doSort();
            renderTable();
        }

        // ==================== 导出 ====================
        function getCSVContent() {
            const rows = [headers.join(',')];
            let displayData = bomData;
            if (activeFilter) {
                displayData = bomData.filter(row => (row['分类'] || '其他') === activeFilter);
            }
            displayData.forEach(row => {
                rows.push(headers.map(h => {
                    const val = (row[h] || '').replace(/"/g, '""');
                    return /[,"\n]/.test(val) ? `"${val}"` : val;
                }).join(','));
            });
            return '\uFEFF' + rows.join('\n'); // BOM for Excel
        }

        function exportCSV() {
            if (bomData.length === 0) return;
            const blob = new Blob([getCSVContent()], { type: 'text/csv;charset=utf-8' });
            downloadBlob(blob, 'BOM_' + new Date().toISOString().slice(0, 10) + '.csv');
        }

        function exportExcel() {
            if (bomData.length === 0) return;
            // 简单 HTML table 转 xls
            let displayData = bomData;
            if (activeFilter) {
                displayData = bomData.filter(row => (row['分类'] || '其他') === activeFilter);
            }
            let html = '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="UTF-8"><!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet><x:Name>BOM</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]--></head><body><table border="1">';
            html += '<tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr>';
            html += displayData.map(row => '<tr>' + headers.map(h => `<td>${(row[h] || '').replace(/&/g, '&amp;').replace(/</g, '&lt;')}</td>`).join('') + '</tr>').join('');
            html += '</table></body></html>';
            const blob = new Blob([html], { type: 'application/vnd.ms-excel;charset=utf-8' });
            downloadBlob(blob, 'BOM_' + new Date().toISOString().slice(0, 10) + '.xls');
        }

        function downloadBlob(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function copyTable() {
            if (bomData.length === 0) return;
            let displayData = bomData;
            if (activeFilter) {
                displayData = bomData.filter(row => (row['分类'] || '其他') === activeFilter);
            }
            const text = [
                headers.join('\t'),
                ...displayData.map(row => headers.map(h => row[h] || '').join('\t'))
            ].join('\n');
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.target.closest('button');
                const origHTML = btn.innerHTML;
                btn.innerHTML = '✅ 已复制';
                btn.classList.add('bg-green-600');
                setTimeout(() => {
                    btn.innerHTML = origHTML;
                    btn.classList.remove('bg-green-600');
                }, 1500);
            }).catch(() => {
                alert('复制失败，请手动选择表格内容');
            });
        }

        // ==================== 键盘快捷键 ====================
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                parseBOM();
            }
        });

        // ==================== 初始化 ====================
        document.getElementById('emptyState').classList.remove('hidden');
        document.getElementById('resultArea').classList.add('hidden');
    </script>
