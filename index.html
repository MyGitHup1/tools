<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        /* ===== Theme: Cyberpunk (default) ===== */
        :root {
            --bg: #0a0a0f; --bg-fixed: #0a0a0f;
            --card-bg: rgba(15,15,25,0.85); --card-bg-solid: #0f0f19;
            --border: rgba(255,255,255,0.06); --border-hover: rgba(255,255,255,0.15);
            --text: #e0e0e0; --text-dim: #8888a0;
            --tag-bg: rgba(255,255,255,0.04); --tag-border: rgba(255,255,255,0.06); --tag-border-hover: rgba(255,255,255,0.15);
            --stat-bg: rgba(255,255,255,0.03); --stat-border: rgba(255,255,255,0.05);
            --footer-text: #555; --footer-border: rgba(255,255,255,0.04);
            --card-glow-opacity: 0.15; --card-shadow: 0 15px 40px rgba(0,0,0,0.4); --card-hover-y: -8px;
            --hero-grad-1: rgba(120,80,255,0.15); --hero-grad-2: rgba(0,180,255,0.12); --hero-grad-3: rgba(255,80,180,0.08);
            --title-grad-1: #c084fc; --title-grad-2: #60a5fa; --title-grad-3: #34d399;
            --hover-arrow-color: var(--card-accent, #60a5fa); --card-name-color: #e8e8f0; --card-blur: 20px;
            --glow-color: rgba(100,130,255,0.12); --glow-size: 300px;
            --hero-icon-glow: radial-gradient(circle, rgba(139,92,246,0.3), transparent);
            --card-before: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02), rgba(255,255,255,0.08));
            --corner-opacity: 0.4; --corner-w: 6px; --corner-h: 6px; --corner-radius: 50%;
        }

        /* ===== Theme: Kawaii ===== */
        body.theme-kawaii {
            --bg: linear-gradient(135deg, #fef5f9, #fdf2f8, #faf5ff, #f0f9ff, #fef5f9); --bg-fixed: #fef5f9;
            --card-bg: rgba(255,255,255,0.75); --card-bg-solid: #fff;
            --border: rgba(236,72,153,0.15); --border-hover: rgba(236,72,153,0.35);
            --text: #4a2c3e; --text-dim: #b0849b;
            --tag-bg: rgba(236,72,153,0.08); --tag-border: rgba(236,72,153,0.12); --tag-border-hover: rgba(236,72,153,0.3);
            --stat-bg: rgba(255,255,255,0.6); --stat-border: rgba(236,72,153,0.15);
            --footer-text: #c4a0b4; --footer-border: rgba(236,72,153,0.1);
            --card-glow-opacity: 0.08; --card-shadow: 0 8px 30px rgba(236,72,153,0.12); --card-hover-y: -6px;
            --hero-grad-1: rgba(236,72,153,0.12); --hero-grad-2: rgba(168,85,247,0.1); --hero-grad-3: rgba(251,146,60,0.08);
            --title-grad-1: #ec4899; --title-grad-2: #a855f7; --title-grad-3: #fb923c;
            --hover-arrow-color: #ec4899; --card-name-color: #3b1f30; --card-blur: 12px;
            --glow-color: rgba(236,72,153,0.08); --glow-size: 300px;
            --hero-icon-glow: radial-gradient(circle, rgba(236,72,153,0.2), transparent);
            --card-before: linear-gradient(135deg, rgba(236,72,153,0.18), rgba(168,85,247,0.1), rgba(251,146,60,0.12));
            --corner-opacity: 0.25; --corner-w: 8px; --corner-h: 8px; --corner-radius: 50%;
            --kawaii-card-radius: 16px;
        }

        /* ===== Theme: Zen Ink ===== */
        body.theme-zen {
            --bg: #f5f0e8; --bg-fixed: #f5f0e8;
            --card-bg: rgba(255,255,255,0.7); --card-bg-solid: #fffef9;
            --border: rgba(0,0,0,0.06); --border-hover: rgba(0,0,0,0.15);
            --text: #3a352f; --text-dim: #9a948a;
            --tag-bg: rgba(0,0,0,0.03); --tag-border: rgba(0,0,0,0.06); --tag-border-hover: rgba(0,0,0,0.15);
            --stat-bg: rgba(0,0,0,0.02); --stat-border: rgba(0,0,0,0.05);
            --footer-text: #b5b0a8; --footer-border: rgba(0,0,0,0.04);
            --card-glow-opacity: 0.02; --card-shadow: 0 4px 20px rgba(0,0,0,0.06); --card-hover-y: -4px;
            --hero-grad-1: rgba(0,0,0,0.03); --hero-grad-2: rgba(0,0,0,0.02); --hero-grad-3: rgba(0,0,0,0.01);

            --hover-arrow-color: var(--card-accent, #5f5e5a); --card-name-color: #2c2c2a; --card-blur: 8px;
            --glow-color: rgba(0,0,0,0.03); --glow-size: 200px;
            --hero-icon-glow: radial-gradient(circle, rgba(0,0,0,0.08), transparent);
            --card-before: linear-gradient(135deg, rgba(0,0,0,0.04), rgba(0,0,0,0.01), rgba(0,0,0,0.04));
            --corner-opacity: 0.2; --corner-w: 4px; --corner-h: 4px; --corner-radius: 50%;
        }

        /* ===== Theme: 8-bit Retro ===== */
        body.theme-retro {
            --bg: #0f380f; --bg-fixed: #0f380f;
            --card-bg: rgba(48,98,48,0.9); --card-bg-solid: #306230;
            --border: rgba(155,188,15,0.15); --border-hover: rgba(155,188,15,0.4);
            --text: #9bbc0f; --text-dim: #8bac0f;
            --tag-bg: rgba(155,188,15,0.08); --tag-border: rgba(155,188,15,0.12); --tag-border-hover: rgba(155,188,15,0.35);
            --stat-bg: rgba(48,98,48,0.5); --stat-border: rgba(155,188,15,0.12);

            --glow-color: rgba(155,188,15,0.06); --glow-size: 250px;

            --card-before: none;

            --retro: 1;
        }

        /* ===== Theme: Vaporwave ===== */
        body.theme-vaporwave {
            --bg: linear-gradient(180deg, #1a0533 0%, #2d1b69 40%, #4a1942 70%, #0f0f2e 100%); --bg-fixed: #1a0533;

            --border: rgba(255,105,180,0.12); --border-hover: rgba(0,255,255,0.3);
            --text: #ffb8d4; --text-dim: #b880b0;

            --corner-opacity: 0.3; --corner-w: 6px; --corner-h: 6px; --corner-radius: 2px;
        }

        /* ===== Theme: Ocean Breeze ===== */
        body.theme-ocean {
            --bg: linear-gradient(180deg, #e3f2fd 0%, #bbdefb 40%, #e8f5f9 70%, #f5faff 100%); --bg-fixed: #e3f2fd;
            --card-bg: rgba(255,255,255,0.65); --card-bg-solid: #fff;

            --stat-bg: rgba(255,255,255,0.5); --stat-border: rgba(30,136,229,0.1);
            --footer-text: #90caf9; --footer-border: rgba(30,136,229,0.08);
            --card-glow-opacity: 0.02; --card-shadow: 0 6px 25px rgba(30,136,229,0.08); --card-hover-y: -5px;

            --card-before: linear-gradient(135deg, rgba(30,136,229,0.1), rgba(100,180,255,0.06), rgba(30,136,229,0.1));
            --corner-opacity: 0.2; --corner-w: 6px; --corner-h: 6px; --corner-radius: 50%;
        }

        /* ===== Theme: Sunset Warm ===== */
        body.theme-sunset {
            --bg: linear-gradient(180deg, #fff8e1 0%, #ffecb3 25%, #ffe0b2 55%, #ffccbc 100%); --bg-fixed: #fff8e1;
            --card-bg: rgba(255,255,255,0.6); --card-bg-solid: #fffef8;

            --stat-bg: rgba(255,255,255,0.5); --stat-border: rgba(230,81,0,0.08);
            --footer-text: #ffab91; --footer-border: rgba(230,81,0,0.06);
            --card-glow-opacity: 0.02; --card-shadow: 0 6px 25px rgba(230,81,0,0.06); --card-hover-y: -5px;
            --hero-grad-1: rgba(255,152,0,0.08); --hero-grad-2: rgba(230,81,0,0.05); --hero-grad-3: rgba(255,183,77,0.04);
            --title-grad-1: #e65100; --title-grad-2: #ff6d00; --title-grad-3: #ff9100;
            --hover-arrow-color: var(--card-accent, #e65100); --card-name-color: #bf360c; --card-blur: 8px;
            --glow-color: rgba(255,152,0,0.05); --glow-size: 280px;
            --hero-icon-glow: radial-gradient(circle, rgba(255,152,0,0.15), transparent);
            --card-before: linear-gradient(135deg, rgba(230,81,0,0.08), rgba(255,152,0,0.05), rgba(230,81,0,0.08));
            --corner-opacity: 0.15; --corner-w: 5px; --corner-h: 5px; --corner-radius: 50%;
        }

        /* ===== Theme: Forest Nature ===== */
        body.theme-forest {
            --bg: linear-gradient(180deg, #e8f5e9 0%, #c8e6c9 30%, #dcedc8 65%, #f1f8e9 100%); --bg-fixed: #e8f5e9;
            --card-bg: rgba(255,255,255,0.55); --card-bg-solid: #f8fbf6;

            --glow-color: rgba(76,175,80,0.04); --glow-size: 220px;
            --hero-icon-glow: radial-gradient(circle, rgba(76,175,80,0.12), transparent);
            --card-before: linear-gradient(135deg, rgba(76,175,80,0.06), rgba(139,195,74,0.04), rgba(76,175,80,0.06));
            --corner-opacity: 0.15; --corner-w: 5px; --corner-h: 5px; --corner-radius: 50%;

            --card-bg: rgba(15,15,30,0.85); --card-bg-solid: #0f0f1e;

            --footer-text: #4a3a6a; --footer-border: rgba(255,100,180,0.06);

            --corner-opacity: 0; --corner-w: 8px; --corner-h: 2px; --corner-radius: 1px;

        /* ===== Theme: Candy Pop ===== */

        body.theme-starry {

        /* ===== Theme: Lava ===== */
        body.theme-lava {
            --bg: #1a0000; --bg-fixed: #1a0000;
            --card-bg: rgba(40,10,10,0.9); --card-bg-solid: #280a0a;
            --border: rgba(255,80,0,0.12); --border-hover: rgba(255,120,0,0.4);

        /* ===== Common base ===== */
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0; overflow-x: hidden;
            color: var(--text);
            transition: color 0.6s;
        }
        body.theme-cyberpunk, body.theme-zen, body.theme-retro, body.theme-neon, body.theme-starry, body.theme-lava, body.theme-newspaper, body.theme-gold-luxury, body.theme-cyber-mahjong, body.theme-tech-blue { background: var(--bg-fixed); }
        body.theme-kawaii, body.theme-vaporwave, body.theme-ocean, body.theme-sunset, body.theme-forest, body.theme-candy, body.theme-aurora, body.theme-sakura, body.theme-purple-dream, body.theme-glass {
            background: var(--bg); background-attachment: fixed;
        }

        /* Retro: pixel border on body */
        body.theme-retro {
            image-rendering: pixelated;
            box-shadow: inset 0 0 0 2px #306230;
        }

        /* Canvas */
        #particleCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none; }

        /* Cursor glow */
        .cursor-glow {
            position: fixed; width: var(--glow-size); height: var(--glow-size);
            border-radius: 50%; pointer-events: none; z-index: 1;
            transform: translate(-50%, -50%); transition: opacity 0.4s;
            background: radial-gradient(circle, var(--glow-color) 0%, transparent 70%);
        }

        /* Hero */
        .hero-section { position: relative; z-index: 2; padding: 5rem 1rem 4rem; text-align: center; overflow: hidden; transition: all 0.6s; }
        .hero-section::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(ellipse at 30% 20%, var(--hero-grad-1) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 60%, var(--hero-grad-2) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 80%, var(--hero-grad-3) 0%, transparent 50%);
            animation: heroPulse 8s ease-in-out infinite; z-index: -1; transition: background 0.6s;
        }
        @keyframes heroPulse { 0%,100% { opacity:0.6; transform:scale(1); } 50% { opacity:1; transform:scale(1.08); } }

        .hero-title {
            font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 800; letter-spacing: -0.03em;
            background: linear-gradient(135deg, var(--title-grad-1), var(--title-grad-2), var(--title-grad-3));
            background-size: 200% 200%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            animation: titleShimmer 4s ease-in-out infinite;
        }
        @keyframes titleShimmer { 0%,100% { background-position:0% 50%; } 50% { background-position:100% 50%; } }
        .hero-subtitle { font-size: 1.1rem; max-width: 32rem; margin: 1rem auto 0; line-height: 1.7; color: var(--text-dim); transition: color 0.6s; }

        .hero-icon { width: 64px; height: 64px; margin: 0 auto 1.5rem; position: relative; }
        .hero-icon::after {
            content: ''; position: absolute; inset: -12px; border-radius: 50%;
            background: var(--hero-icon-glow);
            animation: iconGlow 3s ease-in-out infinite; transition: background 0.6s;
        }
        @keyframes iconGlow { 0%,100% { transform:scale(1); opacity:0.6; } 50% { transform:scale(1.3); opacity:1; } }

        /* Grid */
        .main-content { position: relative; z-index: 2; max-width: 1200px; margin: -3rem auto 0; padding: 0 1.5rem 4rem; }
        .tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.25rem; }

        /* Cards */
        .tool-card {
            position: relative; background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 16px; padding: 1.5rem; cursor: pointer; text-decoration: none; color: inherit;
            transition: all 0.5s cubic-bezier(0.23,1,0.32,1); overflow: hidden;
            backdrop-filter: blur(var(--card-blur)); -webkit-backdrop-filter: blur(var(--card-blur));
        }
        .tool-card::before {
            content: ''; position: absolute; inset: 0; border-radius: 16px; padding: 1px;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude;
            opacity: 0; transition: opacity 0.5s;
        }
        .tool-card::before { background: var(--card-before); }
        .tool-card:hover {
            transform: translateY(var(--card-hover-y));
            border-color: var(--border-hover);
            box-shadow: 0 0 30px color-mix(in srgb, var(--card-accent, #60a5fa) var(--card-glow-opacity), transparent), var(--card-shadow);
        }
        .tool-card:hover { background: var(--card-bg-solid); }
        .tool-card:hover::before { opacity: 1; }

        /* Retro card: pixelated border */
        body.theme-retro .tool-card { border: 2px solid #306230; border-radius: 0; }
        body.theme-retro .tool-card:hover { border-color: #9bbc0f; box-shadow: 6px 6px 0 #0f380f, 0 0 15px rgba(155,188,15,0.3); }
        body.theme-retro .tool-card::before { display: none; }
        body.theme-retro .tool-tag { border-radius: 0; border: 1px solid #306230; }

        /* Neon: glowing border on hover */
        body.theme-neon .tool-card:hover {
            box-shadow: 0 0 12px rgba(255,100,180,0.2), 0 0 28px rgba(255,230,50,0.1), var(--card-shadow);
            border-color: rgba(255,100,180,0.4);
        }
        body.theme-neon .card-corner-dot { border-radius: 1px; height: 2px; width: 20px; opacity: 0; }
        body.theme-neon .tool-card:hover .card-corner-dot { opacity: 0.7; box-shadow: 0 0 12px var(--card-accent,#ff64b4), 0 0 24px var(--card-accent,#ff64b4); }

        /* Candy: extra round */
        body.theme-candy .tool-card { border-radius: 20px; }
        body.theme-candy .tool-card::before { border-radius: 20px; }
        body.theme-candy .tool-tag { border-radius: 16px; font-weight: 500; }

        /* Card corner dots */
        .card-corner-dot {
            position: absolute; border-radius: var(--corner-radius);
            width: var(--corner-w); height: var(--corner-h);
            background: var(--card-accent, #60a5fa);
            box-shadow: 0 0 10px var(--card-accent, #60a5fa);
            transition: all 0.5s; opacity: var(--corner-opacity);
            animation: cornerPulse 3s ease-in-out infinite;
        }
        body.theme-retro .card-corner-dot { display: none; }
        @keyframes cornerPulse { 0%,100% { opacity:var(--corner-opacity); transform:scale(1); } 50% { opacity:calc(var(--corner-opacity)*2); transform:scale(1.3); } }
        .tool-card:hover .card-corner-dot { opacity: 1; box-shadow: 0 0 20px var(--card-accent,#60a5fa), 0 0 40px var(--card-accent,#60a5fa); }
        .card-corner-dot:nth-child(1) { top:12px; left:12px; animation-delay:0s; }
        .card-corner-dot:nth-child(2) { top:12px; right:12px; animation-delay:0.75s; }
        .card-corner-dot:nth-child(3) { bottom:12px; left:12px; animation-delay:1.5s; }
        .card-corner-dot:nth-child(4) { bottom:12px; right:12px; animation-delay:2.25s; }

        /* Icon wrap */
        .card-icon-wrap { width:48px; height:48px; border-radius:12px; display:flex; align-items:center; justify-content:center; position:relative; flex-shrink:0; transition:all 0.5s; }
        body.theme-retro .card-icon-wrap { border-radius: 0; border: 2px solid var(--card-accent,#9bbc0f); }
        body.theme-candy .card-icon-wrap { border-radius: 18px; }
        .card-icon-wrap::after { content:''; position:absolute; inset:-4px; border-radius:16px; background:var(--card-accent,#60a5fa); opacity:0; filter:blur(12px); transition:opacity 0.5s; }
        .tool-card:hover .card-icon-wrap::after { opacity:0.4; }

        /* Tags */
        .tool-tag { font-size:0.7rem; padding:3px 10px; border-radius:999px; background:var(--tag-bg); border:1px solid var(--tag-border); color:var(--text-dim); transition:all 0.4s; }
        .tool-card:hover .tool-tag { border-color:var(--tag-border-hover); color:var(--card-name-color); }

        /* Arrow */
        .card-arrow { transition:all 0.4s; opacity:0.3; color:var(--text-dim); }
        .tool-card:hover .card-arrow { opacity:1; transform:translateX(4px); color:var(--hover-arrow-color); }
        .card-name { font-size:1.05rem; font-weight:600; margin:0; transition:color 0.4s; color:var(--card-name-color); }

        /* ===== Theme Switcher Panel ===== */
        .theme-switcher { position:fixed; bottom:24px; right:24px; z-index:100; }
        .theme-toggle-btn {
            width:52px; height:52px; border-radius:50%; border:none; cursor:pointer;
            font-size:1.5rem; display:flex; align-items:center; justify-content:center;
            transition:all 0.4s cubic-bezier(0.23,1,0.32,1);
            backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
            background:var(--card-bg); border:1px solid var(--border);
            color:var(--hover-arrow-color);
        }
        .theme-toggle-btn:hover { transform:scale(1.1); border-color:var(--border-hover); }

        /* Panel */
        .theme-panel {
            position:absolute; bottom:60px; right:0;
            background:var(--card-bg-solid); border:1px solid var(--border);
            border-radius:16px; padding:12px;
            display:grid; grid-template-columns:repeat(5, 1fr); gap:8px;
            backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
            opacity:0; transform:translateY(12px) scale(0.92);
            pointer-events:none; transition:all 0.3s cubic-bezier(0.23,1,0.32,1);
            box-shadow:0 12px 40px rgba(0,0,0,0.15);
            z-index:99;
        }
        .theme-panel.open { opacity:1; transform:translateY(0) scale(1); pointer-events:auto; }

        .theme-chip {
            width:44px; height:44px; border-radius:12px; border:2px solid transparent;
            cursor:pointer; display:flex; align-items:center; justify-content:center;
            font-size:1.2rem; transition:all 0.25s;
            position:relative;
        }
        .theme-chip:hover { transform:scale(1.15); }
        .theme-chip.active { border-color:var(--hover-arrow-color); box-shadow:0 0 14px var(--hover-arrow-color); }
        .theme-chip .chip-label {
            position:absolute; bottom:-20px; left:50%; transform:translateX(-50%);
            font-size:9px; white-space:nowrap; color:var(--text-dim);
            opacity:0; transition:opacity 0.2s; pointer-events:none;
        }
        .theme-chip:hover .chip-label { opacity:1; }

        body.theme-retro .theme-panel { border-radius: 0; border: 2px solid #306230; }
        body.theme-retro .theme-chip { border-radius: 0; }
        body.theme-candy .theme-panel { border-radius: 20px; }
        body.theme-candy .theme-chip { border-radius: 16px; }

        /* Stats bar */
        .stats-bar { display:flex; gap:1rem; justify-content:center; flex-wrap:wrap; margin-top:2rem; font-size:0.85rem; color:var(--text-dim); transition:color 0.6s; }
        .stat-item { display:flex; align-items:center; gap:0.4rem; padding:0.4rem 1rem; background:var(--stat-bg); border-radius:999px; border:1px solid var(--stat-border); transition:all 0.4s; }
        .stat-dot { width:6px; height:6px; border-radius:50%; background:var(--hover-arrow-color); box-shadow:0 0 6px var(--hover-arrow-color); animation:statBlink 2s ease-in-out infinite; }
        @keyframes statBlink { 0%,100% { opacity:0.3; } 50% { opacity:1; } }

        /* Last-update badge */
        .update-badge { display:flex; align-items:center; gap:0.35rem; padding:0.35rem 0.9rem; background:var(--stat-bg); border-radius:999px; border:1px solid var(--stat-border); font-size:0.75rem; color:var(--text-dim); white-space:nowrap; transition:all 0.4s; cursor:default; }
        .update-badge .update-dot { width:6px; height:6px; border-radius:50%; background:var(--hover-arrow-color); animation:updatePulse 1.6s ease-in-out infinite; flex-shrink:0; }
        @keyframes updatePulse { 0%,100% { opacity:0.5; box-shadow:0 0 4px var(--hover-arrow-color); } 50% { opacity:1; box-shadow:0 0 10px var(--hover-arrow-color); } }
        .update-badge .dot-fresh { background:#3fb950; box-shadow:0 0 8px #3fb950; }
        .update-badge .dot-old   { background:var(--text-dim); box-shadow:none; animation:none; }

        /* Footer */
        .site-footer { position:relative; z-index:2; text-align:center; padding:2rem 1rem; font-size:0.8rem; border-top:1px solid var(--footer-border); color:var(--footer-text); transition:all 0.6s; }

        /* Reveal */
        .reveal { opacity:0; transform:translateY(30px); transition:all 0.6s cubic-bezier(0.23,1,0.32,1); }
        .reveal.visible { opacity:1; transform:translateY(0); }

        /* Responsive */
        @media (max-width:768px) {
            .tools-grid { grid-template-columns:1fr; }
            .main-content { margin-top:-2rem; padding:0 0.75rem 3rem; }
            .theme-switcher { bottom:16px; right:12px; }
            .theme-toggle-btn { width:44px; height:44px; font-size:1.2rem; }
            .theme-panel { grid-template-columns:repeat(5,1fr); gap:6px; padding:8px; }
            .theme-chip { width:36px; height:36px; font-size:1rem; }
        }
    </style>
</head>

        // ==================== Theme Manager ====================
        const allThemeClasses = THEMES.map(t=>'theme-'+t.id);
        let currentTheme = 'cyberpunk';
        let themeSwitchCooldown = false;
        let panelOpen = false;

        function setTheme(theme) {
            if (themeSwitchCooldown || theme === currentTheme) return;
            themeSwitchCooldown = true;

            const body = document.body;
            body.classList.remove(...allThemeClasses);
            body.classList.add('theme-' + theme);
            currentTheme = theme;

            document.getElementById('themeToggleIcon').textContent = THEMES.find(t=>t.id===theme).icon;

            // Update panel active states
            document.querySelectorAll('.theme-chip').forEach(chip => {
                chip.classList.toggle('active', chip.dataset.theme === theme);
            });

            updateCardAccents();
            resetParticles();
            initCursorGlow();

            try { localStorage.setItem('tools-theme', theme); } catch(e) {}

            setTimeout(() => { themeSwitchCooldown = false; }, 600);
        }

        function updateCardAccents() {
            document.querySelectorAll('.tool-card').forEach((card,i) => {
                const tool = tools[i];
                const accent = tool.accents[currentTheme] || tool.accents.cyberpunk;
                card.style.setProperty('--card-accent', accent);
                card.querySelectorAll('.card-corner-dot').forEach(dot => {
                    dot.style.background = accent;
                    dot.style.boxShadow = '0 0 10px ' + accent;
                });
            });
        }

        function restoreTheme() {
            try {
                const saved = localStorage.getItem('tools-theme');
                if (saved && THEMES.some(t=>t.id===saved)) {
                    document.body.classList.remove(...allThemeClasses);
                    document.body.classList.add('theme-' + saved);
                    currentTheme = saved;
                    document.getElementById('themeToggleIcon').textContent = THEMES.find(t=>t.id===saved).icon;
                }
            } catch(e) {}
        }

        // ==================== Last Update Badge ====================
        // ⚠️ 每次推送前更新这个时间戳！
        const LAST_UPDATE = new Date('2026-06-29T22:43:00+08:00');

        function renderUpdateBadge() {
            const badge = document.getElementById('updateBadge');
            const dot   = document.getElementById('updateDot');
            const text  = document.getElementById('updateText');
            if (!badge || !dot || !text) return;

            const now  = new Date();
            const diff = now - LAST_UPDATE; // ms
            const mins = Math.floor(diff / 60000);
            const hrs  = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);

            let label;
            if (mins < 1)  label = '刚刚更新';
            else if (mins < 60) label = mins + ' 分钟前';
            else if (hrs  < 24) label = hrs  + ' 小时前';
            else if (days < 7)  label = days + ' 天前';
            else label = LAST_UPDATE.getMonth()+1 + '月' + LAST_UPDATE.getDate() + '日';

            text.textContent = '更新于 ' + label;
            text.title = '推送时间：' + LAST_UPDATE.toLocaleString('zh-CN');

            // Green dot if within 24h
            if (diff < 86400000) {
                dot.className = 'update-dot dot-fresh';
                badge.style.borderColor = 'rgba(63,185,80,0.25)';
            } else {
                dot.className = 'update-dot dot-old';
                badge.style.borderColor = '';
            }
        }

        // ==================== Theme Panel ====================
        function buildThemePanel() {
            const panel = document.getElementById('themePanel');
            panel.innerHTML = THEMES.map(t => `
                <button class="theme-chip${t.id===currentTheme?' active':''}" data-theme="${t.id}" title="${t.label}">
                    ${t.icon}
                    <span class="chip-label">${t.label}</span>
                </button>
            `).join('');

            panel.querySelectorAll('.theme-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    setTheme(chip.dataset.theme);
                    closePanel();
                });
            });
        }

        function togglePanel() {
            const panel = document.getElementById('themePanel');
            panelOpen = !panelOpen;
            panel.classList.toggle('open', panelOpen);
        }

        function closePanel() {
            panelOpen = false;
            document.getElementById('themePanel').classList.remove('open');
        }

        document.getElementById('themeToggle').addEventListener('click', togglePanel);
        document.addEventListener('click', (e) => {
            if (panelOpen && !e.target.closest('.theme-switcher')) closePanel();
        });

        // ==================== Render Cards ====================
        function renderTools() {
            const grid = document.getElementById('toolsGrid');
            const empty = document.getElementById('emptyState');
            if (tools.length === 0) { grid.style.display='none'; empty.classList.remove('hidden'); return; }
            grid.style.display=''; empty.classList.add('hidden');

            grid.innerHTML = tools.map((tool,i) => {
                const a = tool.accents[currentTheme] || tool.accents.cyberpunk;
                return `<a href="${tool.path}" class="tool-card reveal" style="--card-accent:${a};transition-delay:${i*0.06}s">
                    <span class="card-corner-dot" style="background:${a};box-shadow:0 0 10px ${a}"></span>
                    <span class="card-corner-dot" style="background:${a};box-shadow:0 0 10px ${a}"></span>
                    <span class="card-corner-dot" style="background:${a};box-shadow:0 0 10px ${a}"></span>
                    <span class="card-corner-dot" style="background:${a};box-shadow:0 0 10px ${a}"></span>
                    <div style="display:flex;align-items:flex-start;gap:1rem;">
                        <div class="card-icon-wrap" style="background:${a}22;color:${a}">
                            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">${tool.icon}</svg>
                        </div>
                        <div style="flex:1;min-width:0;">
                            <div style="display:flex;align-items:center;justify-content:space-between;">
                                <h3 class="card-name">${tool.name}</h3>
                                <svg class="card-arrow" width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
                            </div>
                            <p style="font-size:0.8rem;color:var(--text-dim);line-height:1.5;margin:0.5rem 0 0.75rem;">${tool.desc}</p>
                            <div style="display:flex;flex-wrap:wrap;gap:6px;">${tool.tags.map(t=>`<span class="tool-tag">${t}</span>`).join('')}</div>
                        </div>
                    </div>
                </a>`;
            }).join('');

            observeReveal();
        }

        function observeReveal() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
            }, { threshold:0.1, rootMargin:'0px 0px -40px 0px' });
            document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
        }

        // ==================== Particle System ====================
        const PARTICLE_COUNT = 120;
        let particles = [];
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let mouse = { x:-999, y:-999 };

        function resize() { canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
        resize(); window.addEventListener('resize', resize);

        function getPalette() {
            return PARTICLE_PALETTES[currentTheme] || PARTICLE_PALETTES.cyberpunk;
        }

        // ---- Shape drawers ----
        function drawHeart(cx,cy,size) {
            ctx.beginPath(); const s=size*1.2;
            ctx.moveTo(cx,cy+s*0.3);
            ctx.bezierCurveTo(cx,cy,cx-s,cy,cx-s,cy-s*0.4);
            ctx.bezierCurveTo(cx-s,cy-s*0.9,cx-s*0.4,cy-s,cx,cy-s*0.4);
            ctx.bezierCurveTo(cx+s*0.4,cy-s,cx+s,cy-s*0.9,cx+s,cy-s*0.4);
            ctx.bezierCurveTo(cx+s,cy,cx,cy,cx,cy+s*0.3);
            ctx.closePath();
        }
        function drawStar(cx,cy,size) {
            ctx.beginPath(); const spi=5,o=size*1.3,inn=size*0.5;
            for(let i=0;i<spi*2;i++) {
                const r=i%2===0?o:inn;
                const angle=(Math.PI*2*i)/(spi*2)-Math.PI/2;
                const x=cx+Math.cos(angle)*r, y=cy+Math.sin(angle)*r;
                i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
            }
            ctx.closePath();
        }
        function drawSparkle(cx,cy,size) {
            ctx.beginPath(); const len=size*2;
            for(let i=0;i<4;i++) {
                const a=(Math.PI/2)*i;
                ctx.moveTo(cx,cy);
                ctx.lineTo(cx+Math.cos(a+0.3)*len*0.35,cy+Math.sin(a+0.3)*len*0.35);
                ctx.lineTo(cx+Math.cos(a)*len,cy+Math.sin(a)*len);
                ctx.lineTo(cx+Math.cos(a-0.3)*len*0.35,cy+Math.sin(a-0.3)*len*0.35);
                ctx.lineTo(cx,cy);
            }
            ctx.closePath();
        }
        function drawLeaf(cx,cy,size) {
            ctx.beginPath();
            ctx.ellipse(cx,cy-size*0.15,size*0.35,size*0.7,0.3,0,Math.PI*2);
            ctx.fill(); ctx.beginPath();
            ctx.moveTo(cx,cy-size*0.8); ctx.lineTo(cx,cy+size*0.6);
            ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth=0.5; ctx.stroke();
        }
        function drawSakuraPetal(cx,cy,size) {
            ctx.beginPath();
            ctx.moveTo(cx,cy);
            ctx.bezierCurveTo(cx-size*0.5,cy-size*0.5,cx-size*0.8,cy+size*0.2,cx,cy+size*0.3);
            ctx.bezierCurveTo(cx+size*0.8,cy+size*0.2,cx+size*0.5,cy-size*0.5,cx,cy);
            ctx.closePath();
        }
        function drawMeteor(cx,cy,size) {
            ctx.beginPath();
            ctx.moveTo(cx,cy);
            ctx.lineTo(cx-size*3,cy+size*0.8);
            ctx.lineWidth = size*0.3;
            ctx.strokeStyle = ctx.fillStyle;
            ctx.stroke();
            // 流星头部发光
            ctx.beginPath();
            ctx.arc(cx,cy,size*0.5,0,Math.PI*2);
            ctx.fill();
        }
        function drawMahjong(cx,cy,size) {
            ctx.beginPath();
            const r = size*0.2;
            ctx.moveTo(cx-size+r,cy-size*0.8);
            ctx.lineTo(cx+size-r,cy-size*0.8);
            ctx.quadraticCurveTo(cx+size,cy-size*0.8,cx+size,cy-size*0.8+r);
            ctx.lineTo(cx+size,cy+size*0.8-r);
            ctx.quadraticCurveTo(cx+size,cy+size*0.8,cx+size-r,cy+size*0.8);
            ctx.lineTo(cx+size-r,cy+size*0.8);
            ctx.quadraticCurveTo(cx-size,cy+size*0.8,cx-size,cy+size*0.8-r);
            ctx.lineTo(cx-size,cy-size*0.8+r);
            ctx.quadraticCurveTo(cx-size,cy-size*0.8,cx-size+r,cy-size*0.8);
            ctx.closePath();
        }

        class Particle {
            constructor() { this.reset(true); }
            reset(init){
                const pal = getPalette();
                this.x = init ? Math.random()*canvas.width : (Math.random()<0.5?-30:canvas.width+30);
                this.y = init ? Math.random()*canvas.height : -30;
                const [minS,maxS] = pal.size;
                this.size = minS + Math.random()*(maxS-minS);
                this.opacity = Math.random()*0.4+0.1;
                this.rotation = Math.random()*Math.PI*2;
                this.rotSpeed = (Math.random()-0.5)*0.04;
                const [minSp,maxSp] = pal.speed;
                const sp = minSp+Math.random()*(maxSp-minSp);
                const angle = Math.random()*Math.PI*2;
                this.vx = Math.cos(angle)*sp;
                this.vy = Math.sin(angle)*sp-0.1;
                this.shape = 'dot';
                const hueGroup = pal.hues[Math.floor(Math.random()*pal.hues.length)];
                this.hue = hueGroup.h + (Math.random()-0.5)*hueGroup.w;
                this.sat = pal.sat + Math.random()*15;
                this.lit = pal.lit + (Math.random()-0.5)*20;

                if(currentTheme==='kawaii') this.shape = ['heart','heart','star','sparkle'][Math.floor(Math.random()*4)];
                if(currentTheme==='retro') { this.shape='pixel'; this.size=Math.max(3,this.size); }
                if(currentTheme==='vaporwave') this.shape = ['dot','dot','dot','sparkle'][Math.floor(Math.random()*4)];
                if(currentTheme==='ocean') this.shape = 'bubble';
                if(currentTheme==='forest') this.shape = Math.random()<0.3?'leaf':'dot';
                if(currentTheme==='sunset') { this.vy=-0.15-(Math.random()*0.25); this.vx=(Math.random()-0.5)*0.3; }
                if(currentTheme==='neon') this.opacity = Math.random()*0.55+0.25;
                if(currentTheme==='candy') this.shape='dot';
                if(currentTheme==='zen') { this.opacity=Math.random()*0.2+0.04; this.size=Math.random()*6+2; this.vy=-0.02-(Math.random()*0.06); }
                if(currentTheme==='starry') { this.shape = Math.random()<0.3?'star':'dot'; this.opacity=Math.random()*0.5+0.3; }
                if(currentTheme==='aurora') { this.shape='wave'; this.opacity=Math.random()*0.3+0.2; }
                if(currentTheme==='lava') { this.shape='lava'; this.opacity=Math.random()*0.4+0.3; }
                if(currentTheme==='sakura') { this.shape='petal'; this.opacity=Math.random()*0.4+0.3; this.vy=0.05+Math.random()*0.15; }
                if(currentTheme==='newspaper') { this.shape='dot'; this.opacity=Math.random()*0.15+0.05; }
                if(currentTheme==='purple-dream') { this.shape='blur'; this.opacity=Math.random()*0.3+0.2; }
                if(currentTheme==='gold-luxury') { this.shape='gold'; this.opacity=Math.random()*0.5+0.3; }
                if(currentTheme==='glass') { this.shape='dot'; this.opacity=Math.random()*0.3+0.2; }
                if(currentTheme==='cyber-mahjong') { this.shape='mahjong'; this.opacity=Math.random()*0.4+0.3; }
                if(currentTheme==='tech-blue') { this.shape='data'; this.opacity=Math.random()*0.4+0.3; }
                if(currentTheme==='smoke') {
                    this.shape='smoke';
                    this.size = 18 + Math.random()*40;
                    this.opacity = Math.random()*0.12+0.04;
                    this.vy = -(0.12+Math.random()*0.2);
                    this.vx = (Math.random()-0.5)*0.15;
                    this.growRate = 0.03+Math.random()*0.05;
                    this.twistSpeed = (Math.random()-0.5)*0.006;
                }
            }
            update(){
                this.x+=this.vx; this.y+=this.vy; this.rotation+=this.rotSpeed;
                const dx=mouse.x-this.x, dy=mouse.y-this.y, dist=Math.sqrt(dx*dx+dy*dy);
                if(dist<180){ const f=(180-dist)/180; this.vx+=(dx/dist)*f*0.02; this.vy+=(dy/dist)*f*0.02; }
                this.vx*=0.999; this.vy*=0.999;
                const speed=Math.sqrt(this.vx*this.vx+this.vy*this.vy);
                if(speed>2){ this.vx=(this.vx/speed)*2; this.vy=(this.vy/speed)*2; }
                // Retro: fall down
                if(currentTheme==='retro'){ this.vy+=0.03; if(this.y>canvas.height+20){this.y=-20;this.x=Math.random()*canvas.width;this.vy=0.5+Math.random()*0.8;} }
                // Ocean: float up
                if(currentTheme==='ocean'){ this.vy-=0.005; if(this.y<-20){this.y=canvas.height+20;this.x=Math.random()*canvas.width;this.vy=-(0.1+Math.random()*0.25);} }
                // Forest: gentle fall
                if(currentTheme==='forest'&&this.shape==='leaf'){ this.vy+=0.003; this.vx+=Math.sin(this.rotation)*0.005; if(this.y>canvas.height+30){this.y=-30;this.x=Math.random()*canvas.width;this.vy=0.05+Math.random()*0.2;} }
                // Sunset: particles rise gently
                if(currentTheme==='sunset'){ if(this.y<-20||this.y>canvas.height+20){this.y=canvas.height+20;this.x=Math.random()*canvas.width;this.vy=-0.1-Math.random()*0.3;this.vx=(Math.random()-0.5)*0.3;} }
                // Starry: some particles move fast like meteors
                if(currentTheme==='starry' && this.shape==='star' && Math.random()<0.01){ this.vx=(Math.random()-0.5)*0.5; this.vy=0.3+Math.random()*0.5; }
                // Aurora: wave-like movement
                if(currentTheme==='aurora'){ this.vx+=Math.sin(this.y*0.01)*0.001; }
                // Lava: particles rise like lava
                if(currentTheme==='lava'){ this.vy-=0.002; if(this.y<-20){this.y=canvas.height+20;this.x=Math.random()*canvas.width;} }
                // Sakura: petal fall with sway
                if(currentTheme==='sakura'){ this.vx+=Math.sin(this.rotation)*0.003; this.rotation+=0.01; if(this.y>canvas.height+30){this.y=-30;this.x=Math.random()*canvas.width;} }
                // Newspaper: very slow movement
                if(currentTheme==='newspaper'){ this.vx*=0.9995; this.vy*=0.9995; }
                // Gold luxury: glow particles
                if(currentTheme==='gold-luxury'){ this.opacity=0.3+Math.sin(Date.now()*0.001+this.x)*0.2; }
                // Cyber mahjong: slow rotation and fall
                if(currentTheme==='cyber-mahjong'){ this.rotation+=0.02; this.vy=0.05+Math.random()*0.1; if(this.y>canvas.height+30){this.y=-30;this.x=Math.random()*canvas.width;} }
                // Tech blue: data flow effect
                if(currentTheme==='tech-blue'){ this.vx=0.2+Math.random()*0.3; if(this.x>canvas.width+30){this.x=-30;} }
                // Smoke: rise, expand, fade
                if(currentTheme==='smoke'){
                    this.vy -= 0.001;
                    this.vx += this.twistSpeed;
                    this.size += this.growRate;
                    this.opacity -= 0.00018;
                    if(this.opacity<=0 || this.y<-100){
                        this.x = Math.random()*canvas.width;
                        this.y = canvas.height + 20;
                        this.size = 18+Math.random()*20;
                        this.opacity = Math.random()*0.12+0.04;
                        this.vy = -(0.12+Math.random()*0.2);
                        this.vx = (Math.random()-0.5)*0.15;
                        this.twistSpeed = (Math.random()-0.5)*0.006;
                    }
                }
                // Wrap
                if(this.x<-50)this.x=canvas.width+50; if(this.x>canvas.width+50)this.x=-50;
                if(!['retro','ocean','forest','sunset','lava','sakura','cyber-mahjong','smoke'].includes(currentTheme)){
                    if(this.y<-50)this.y=canvas.height+50; if(this.y>canvas.height+50)this.y=-50;
                }
            }
            draw(ctx){
                ctx.save(); ctx.translate(this.x,this.y); ctx.rotate(this.rotation);
                const color = `hsla(${this.hue},${this.sat}%,${this.lit}%,${this.opacity})`;
                ctx.fillStyle = color;

                if(this.shape==='heart'){ drawHeart(0,0,this.size); ctx.fill(); }
                else if(this.shape==='star'){ drawStar(0,0,this.size); ctx.fill(); }
                else if(this.shape==='sparkle'){ drawSparkle(0,0,this.size); ctx.fill(); }
                else if(this.shape==='pixel'){ ctx.fillRect(-this.size/2,-this.size/2,this.size,this.size); }
                else if(this.shape==='bubble'){
                    ctx.beginPath(); ctx.arc(0,0,this.size,0,Math.PI*2);
                    ctx.fillStyle=`hsla(${this.hue},${this.sat}%,${this.lit}%,${this.opacity*0.5})`;
                    ctx.fill();
                    ctx.strokeStyle=`hsla(${this.hue},${this.sat}%,90%,${this.opacity*0.8})`; ctx.lineWidth=0.5; ctx.stroke();
                    // bubble highlight
                    ctx.beginPath(); ctx.arc(-this.size*0.25,-this.size*0.35,this.size*0.2,0,Math.PI*2);
                    ctx.fillStyle=`rgba(255,255,255,${this.opacity*0.4})`; ctx.fill();
                }
                else if(this.shape==='leaf'){ drawLeaf(0,0,this.size); ctx.fillStyle=color; ctx.fill(); }
                else if(this.shape==='petal'){ drawSakuraPetal(0,0,this.size); ctx.fillStyle=color; ctx.fill(); }
                else if(this.shape==='wave'){ 
                    ctx.beginPath(); 
                    for(let i=0;i<6;i++){ 
                        const wx=(i-3)*this.size*0.6; 
                        const wy=Math.sin(i*0.8+this.rotation)*this.size*0.5; 
                        i===0?ctx.moveTo(wx,wy):ctx.lineTo(wx,wy); 
                    } 
                    ctx.strokeStyle=color; ctx.lineWidth=this.size*0.3; ctx.stroke(); 
                }
                else if(this.shape==='lava'){ 
                    ctx.shadowColor = color; ctx.shadowBlur = 15; 
                    ctx.beginPath(); ctx.arc(0,0,this.size,0,Math.PI*2); ctx.fill(); 
                    ctx.shadowBlur = 0; 
                }
                else if(this.shape==='blur'){ 
                    ctx.beginPath(); ctx.arc(0,0,this.size,0,Math.PI*2); 
                    ctx.fillStyle=`hsla(${this.hue},${this.sat}%,${this.lit}%,${this.opacity*0.4})`; 
                    ctx.fill(); 
                }
                else if(this.shape==='gold'){ 
                    ctx.shadowColor = color; ctx.shadowBlur = 20; 
                    ctx.beginPath(); ctx.arc(0,0,this.size,0,Math.PI*2); ctx.fill(); 
                    ctx.shadowBlur = 0; 
                }
                else if(this.shape==='mahjong'){ 
                    drawMahjong(0,0,this.size); 
                    ctx.fillStyle=`hsla(${this.hue},${this.sat}%,${this.lit}%,${this.opacity*0.3})`; 
                    ctx.fill(); 
                    ctx.strokeStyle=`hsla(${this.hue},${this.sat}%,${this.lit}%,${this.opacity*0.8})`; 
                    ctx.lineWidth=1; ctx.stroke(); 
                }
                else if(this.shape==='data'){ 
                    ctx.fillRect(-this.size*0.5,-this.size*0.2,this.size,this.size*0.4); 
                }
                else if(this.shape==='smoke'){
                    const grd = ctx.createRadialGradient(0,0,0,0,0,this.size);
                    grd.addColorStop(0, `hsla(${this.hue},${this.sat}%,${this.lit}%,${this.opacity})`);
                    grd.addColorStop(0.55, `hsla(${this.hue},${this.sat}%,${this.lit}%,${this.opacity*0.5})`);
                    grd.addColorStop(1, `hsla(${this.hue},${this.sat}%,${this.lit}%,0)`);
                    ctx.fillStyle = grd;
                    ctx.beginPath(); ctx.arc(0,0,this.size,0,Math.PI*2); ctx.fill();
                }
                else {
                    // Zen: soft ink blob
                    if(currentTheme==='zen'){
                        ctx.beginPath(); ctx.arc(0,0,this.size,0,Math.PI*2);
                        ctx.fill();
                        ctx.beginPath(); ctx.arc(this.size*0.3,this.size*0.2,this.size*0.6,0,Math.PI*2);
                        ctx.fillStyle=`hsla(${this.hue},${this.sat}%,${this.lit}%,${this.opacity*0.5})`; ctx.fill();
                    }
                    // Neon: glow effect
                    else if(currentTheme==='neon'){
                        ctx.shadowColor = color; ctx.shadowBlur = 8;
                        ctx.beginPath(); ctx.arc(0,0,this.size,0,Math.PI*2); ctx.fill();
                        ctx.shadowBlur = 0;
                    }
                    else {
                        ctx.beginPath(); ctx.arc(0,0,this.size,0,Math.PI*2); ctx.fill();
                    }
                }
                ctx.restore();
            }
        }

        function resetParticles() {
            if (window._animFrame) cancelAnimationFrame(window._animFrame);
            particles = [];
            for (let i=0;i<PARTICLE_COUNT;i++) particles.push(new Particle());
            animateParticles();
        }

        function animateParticles() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            particles.forEach(p=>{p.update();p.draw(ctx);});

            // Connections vary by theme
            const maxDist = currentTheme==='kawaii'?0:currentTheme==='vaporwave'?90:currentTheme==='zen'?60:currentTheme==='neon'?100:120;
            const lineOpacity = currentTheme==='vaporwave'?0.06:currentTheme==='neon'?0.1:currentTheme==='zen'?0.04:0.08;

            if (!['kawaii','retro','ocean','sunset','forest','candy','lava','sakura','newspaper','gold-luxury','glass','cyber-mahjong','smoke'].includes(currentTheme)) {
                for(let i=0;i<particles.length;i++){
                    for(let j=i+1;j<particles.length;j++){
                        const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y;
                        const dist=Math.sqrt(dx*dx+dy*dy);
                        if(dist<maxDist){
                            ctx.beginPath(); ctx.moveTo(particles[i].x,particles[i].y); ctx.lineTo(particles[j].x,particles[j].y);
                            const t = currentTheme==='vaporwave'?'255,105,180':currentTheme==='neon'?'255,100,180':currentTheme==='zen'?'0,0,0':'100,140,255';
                            ctx.strokeStyle=`rgba(${t},${(1-dist/maxDist)*lineOpacity})`;
                            ctx.lineWidth=0.5; ctx.stroke();
                        }
                    }
                }
            }

            window._animFrame = requestAnimationFrame(animateParticles);
        }

        // ==================== Cursor Glow ====================
        function initCursorGlow() {}
        document.addEventListener('mousemove', e => {
            const g=document.getElementById('cursorGlow');
            g.style.left=e.clientX+'px'; g.style.top=e.clientY+'px'; g.style.opacity='1';
        });
        document.addEventListener('mouseleave', ()=>{
            document.getElementById('cursorGlow').style.opacity='0';
        });

        // ==================== Card Tilt ====================
        function initCardTilt() {
            document.addEventListener('mousemove', e => {
                document.querySelectorAll('.tool-card:hover').forEach(card => {
                    const r=card.getBoundingClientRect();
                    const x=(e.clientX-r.left)/r.width-0.5;
                    const y=(e.clientY-r.top)/r.height-0.5;
                    const ti = ['kawaii','zen','ocean','sunset','forest','candy','vaporwave','sakura','newspaper','glass','purple-dream'].includes(currentTheme)?3:6;
                    card.style.transform = `translateY(${currentTheme==='kawaii'||currentTheme==='zen'?'-4px':'-8px'}) perspective(800px) rotateY(${x*ti}deg) rotateX(${-y*4}deg)`;
                });
            });
            document.addEventListener('mouseleave',()=>{
                document.querySelectorAll('.tool-card').forEach(c=>c.style.transform='');
            },true);
        }

        // ==================== Boot ====================
        restoreTheme();
        buildThemePanel();
        renderTools();
        resetParticles();
        initCardTilt();
        renderUpdateBadge();
    </script>
</body>
</html>
