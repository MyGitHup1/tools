<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tools - 在线工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        :root {
            --bg: #0a0a0f;
            --card-bg: rgba(15, 15, 25, 0.85);
            --border: rgba(255, 255, 255, 0.06);
            --text: #e0e0e0;
            --text-dim: #8888a0;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            overflow-x: hidden;
        }

        /* ======== Canvas 粒子背景 ======== */
        #particleCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        /* ======== 鼠标光晕 ======== */
        .cursor-glow {
            position: fixed;
            width: 300px; height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(100, 130, 255, 0.12) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
            transform: translate(-50%, -50%);
            transition: opacity 0.3s;
        }

        /* ======== Hero 区块 ======== */
        .hero-section {
            position: relative;
            z-index: 2;
            padding: 5rem 1rem 4rem;
            text-align: center;
            overflow: hidden;
        }
        .hero-section::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: 
                radial-gradient(ellipse at 30% 20%, rgba(120, 80, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 60%, rgba(0, 180, 255, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(255, 80, 180, 0.08) 0%, transparent 50%);
            animation: heroPulse 8s ease-in-out infinite;
            z-index: -1;
        }
        @keyframes heroPulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.08); }
        }

        .hero-title {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #c084fc, #60a5fa, #34d399);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleShimmer 4s ease-in-out infinite;
        }
        @keyframes titleShimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .hero-subtitle {
            color: #8888a0;
            font-size: 1.1rem;
            max-width: 32rem;
            margin: 1rem auto 0;
            line-height: 1.7;
        }

        .hero-icon {
            width: 64px; height: 64px;
            margin: 0 auto 1.5rem;
            position: relative;
        }
        .hero-icon::after {
            content: '';
            position: absolute;
            inset: -12px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.3), transparent);
            animation: iconGlow 3s ease-in-out infinite;
        }
        @keyframes iconGlow {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.3); opacity: 1; }
        }

        /* ======== 工具网格 ======== */
        .main-content {
            position: relative; z-index: 2;
            max-width: 1200px; margin: -3rem auto 0;
            padding: 0 1.5rem 4rem;
        }
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.25rem;
        }

        /* ======== 卡片 ======== */
        .tool-card {
            position: relative;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .tool-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02), rgba(255,255,255,0.08));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.4s;
        }
        .tool-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 
                0 0 30px var(--card-glow, rgba(100, 130, 255, 0.15)),
                0 15px 40px rgba(0, 0, 0, 0.4);
        }
        .tool-card:hover::before {
            opacity: 1;
        }

        /* 卡片角标光点 */
        .card-corner-dot {
            position: absolute;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--card-accent, #60a5fa);
            box-shadow: 0 0 10px var(--card-accent, #60a5fa);
            transition: all 0.4s;
            opacity: 0.5;
        }
        .tool-card:hover .card-corner-dot {
            opacity: 1;
            box-shadow: 0 0 20px var(--card-accent, #60a5fa), 0 0 40px var(--card-accent, #60a5fa);
        }
        .card-corner-dot.tl { top: 12px; left: 12px; }
        .card-corner-dot.tr { top: 12px; right: 12px; }
        .card-corner-dot.bl { bottom: 12px; left: 12px; }
        .card-corner-dot.br { bottom: 12px; right: 12px; }

        /* 卡片图标 */
        .card-icon-wrap {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            flex-shrink: 0;
        }
        .card-icon-wrap::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 16px;
            background: var(--card-accent, #60a5fa);
            opacity: 0;
            filter: blur(12px);
            transition: opacity 0.4s;
        }
        .tool-card:hover .card-icon-wrap::after {
            opacity: 0.4;
        }

        /* 标签 */
        .tool-tag {
            font-size: 0.7rem;
            padding: 3px 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: var(--text-dim);
            transition: all 0.3s;
        }
        .tool-card:hover .tool-tag {
            border-color: rgba(255, 255, 255, 0.15);
            color: #aaa;
        }

        /* 箭头 */
        .card-arrow {
            transition: all 0.3s;
            opacity: 0.3;
        }
        .tool-card:hover .card-arrow {
            opacity: 1;
            transform: translateX(4px);
            color: var(--card-accent, #60a5fa);
        }

        /* ======== 统计条 ======== */
        .stats-bar {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--text-dim);
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .stat-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #60a5fa;
            box-shadow: 0 0 6px #60a5fa;
            animation: statBlink 2s ease-in-out infinite;
        }
        @keyframes statBlink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* ======== Footer ======== */
        .site-footer {
            position: relative; z-index: 2;
            text-align: center;
            padding: 2rem 1rem;
            color: #555;
            font-size: 0.8rem;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }

        /* ======== 滚动入场动画 ======== */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ======== 响应式 ======== */
        @media (max-width: 768px) {
            .tools-grid { grid-template-columns: 1fr; }
            .main-content { margin-top: -2rem; padding: 0 0.75rem 3rem; }
        }
    </style>
</head>
<body>

    <!-- 粒子背景 -->
    <canvas id="particleCanvas"></canvas>

    <!-- 鼠标光晕 -->
    <div class="cursor-glow" id="cursorGlow"></div>

    <!-- Hero -->
    <header class="hero-section">
        <div class="hero-icon">
            <svg width="64" height="64" fill="none" stroke="url(#heroSvgGrad)" stroke-width="1.5" viewBox="0 0 24 24" style="position:relative;z-index:1">
                <defs>
                    <linearGradient id="heroSvgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#c084fc"/>
                        <stop offset="50%" stop-color="#60a5fa"/>
                        <stop offset="100%" stop-color="#34d399"/>
                    </linearGradient>
                </defs>
                <path stroke-linecap="round" stroke-linejoin="round" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/>
            </svg>
        </div>
        <h1 class="hero-title">My Tools</h1>
        <p class="hero-subtitle">高效在线工具箱 · 所有工具浏览器本地运行 · 数据不外传</p>

        <div class="stats-bar">
            <span class="stat-item"><span class="stat-dot"></span> 6 个工具</span>
            <span class="stat-item">🔒 本地运行</span>
            <span class="stat-item">⚡ 即开即用</span>
            <span class="stat-item">🎨 2026</span>
        </div>
    </header>

    <!-- 工具网格 -->
    <main class="main-content">
        <div class="tools-grid" id="toolsGrid"></div>

        <div id="emptyState" class="hidden" style="text-align:center;padding:4rem 0;">
            <svg width="64" height="64" style="margin:0 auto 1rem;opacity:0.2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/>
            </svg>
            <p style="color:#555;">暂无工具，快去添加吧</p>
        </div>
    </main>

    <footer class="site-footer">
        My Tools &copy; 2026 — 所有工具均在浏览器本地运行，安全可靠
    </footer>

    <script>
        // ==================== 工具注册表 ====================
        const tools = [
            {
                name: "文件 Hash 两两对比",
                desc: "批量上传文件，计算 MD5/SHA-1/SHA-256 哈希值，自动两两对比快速找出重复文件",
                icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>',
                path: "tools/hash-compare/index.html",
                accent: "#60a5fa",
                tags: ["文件", "哈希", "对比"]
            },
            {
                name: "取色器",
                desc: "可视化拾取颜色，色相/饱和度/明度调节，透明度控制，HEX/RGB/HSL 格式切换，屏幕取色和颜色历史记录",
                icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"/>',
                path: "tools/color-picker/index.html",
                accent: "#c084fc",
                tags: ["颜色", "取色", "设计"]
            },
            {
                name: "二维码生成器",
                desc: "输入文字或链接实时生成二维码，支持尺寸/颜色/纠错级别调节、Wi-Fi/名片等快捷模板，可下载 PNG",
                icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2.48a2.5 2.5 0 00-4.52 0H4m16 0v-4a2 2 0 00-2-2h-1.5m2 6H20M4 15v-4a2 2 0 012-2h1.5M4 15h1.5M12 9v4m-4-6h8M8 3v2m8-2v2"/>',
                path: "tools/qrcode-generator/index.html",
                accent: "#818cf8",
                tags: ["二维码", "生成", "分享"]
            },
            {
                name: "JSON 格式化工具",
                desc: "在线 JSON 格式化/压缩/校验，语法高亮、Key 排序、自定义缩进、节点统计，Ctrl+Enter 快捷格式化",
                icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>',
                path: "tools/json-formatter/index.html",
                accent: "#f59e0b",
                tags: ["JSON", "格式化", "开发"]
            },
            {
                name: "高压电源设计工具箱",
                desc: "硬件工程师专属：分压器设计(自动算串联数/功耗)、RC充放电曲线、功率热耗散结温、电容储能TNT当量",
                icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>',
                path: "tools/hv-design/index.html",
                accent: "#f87171",
                tags: ["高压", "分压器", "RC", "硬件"]
            },
            {
                name: "BOM 整理工具",
                desc: "粘贴物料清单自动分类(电阻/电容/IC等19类)、排序筛选、统计概览，支持导出CSV/Excel和复制表格",
                icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"/>',
                path: "tools/bom-organizer/index.html",
                accent: "#2dd4bf",
                tags: ["BOM", "物料", "硬件"]
            }
        ];

        // ==================== 渲染卡片 ====================
        function renderTools() {
            const grid = document.getElementById('toolsGrid');
            const emptyState = document.getElementById('emptyState');

            if (tools.length === 0) {
                grid.style.display = 'none';
                emptyState.classList.remove('hidden');
                return;
            }

            grid.style.display = '';
            emptyState.classList.add('hidden');

            grid.innerHTML = tools.map((tool, i) => `
                <a href="${tool.path}" class="tool-card reveal"
                   style="--card-accent: ${tool.accent}; --card-glow: ${tool.accent}33; transition-delay: ${i * 0.06}s">
                    <!-- 四角光点 -->
                    <span class="card-corner-dot tl" style="background:${tool.accent};box-shadow:0 0 10px ${tool.accent}"></span>
                    <span class="card-corner-dot tr" style="background:${tool.accent};box-shadow:0 0 10px ${tool.accent}"></span>
                    <span class="card-corner-dot bl" style="background:${tool.accent};box-shadow:0 0 10px ${tool.accent}"></span>
                    <span class="card-corner-dot br" style="background:${tool.accent};box-shadow:0 0 10px ${tool.accent}"></span>

                    <div style="display:flex;align-items:flex-start;gap:1rem;">
                        <div class="card-icon-wrap" style="background:${tool.accent}22;color:${tool.accent}">
                            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                ${tool.icon}
                            </svg>
                        </div>
                        <div style="flex:1;min-width:0;">
                            <div style="display:flex;align-items:center;justify-content:space-between;">
                                <h3 style="font-size:1.05rem;font-weight:600;color:#e8e8f0;margin:0;
                                    transition:color 0.3s;">${tool.name}</h3>
                                <svg class="card-arrow" width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="flex-shrink:0;">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
                                </svg>
                            </div>
                            <p style="font-size:0.8rem;color:#8888a0;line-height:1.5;margin:0.5rem 0 0.75rem;">${tool.desc}</p>
                            <div style="display:flex;flex-wrap:wrap;gap:6px;">
                                ${tool.tags.map(tag => `<span class="tool-tag">${tag}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                </a>
            `).join('');

            // 滚动入场动画
            observeReveal();
        }

        // ==================== Intersection Observer 入场动画 ====================
        function observeReveal() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        }

        // ==================== 粒子背景 ====================
        function initParticles() {
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            let mouse = { x: -999, y: -999 };
            const PARTICLE_COUNT = 120;

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            class Particle {
                constructor() {
                    this.reset(true);
                }
                reset(init = false) {
                    this.x = init ? Math.random() * canvas.width : (Math.random() < 0.5 ? -20 : canvas.width + 20);
                    this.y = Math.random() * canvas.height;
                    this.vx = (Math.random() - 0.5) * 0.6;
                    this.vy = (Math.random() - 0.5) * 0.4;
                    this.size = Math.random() * 1.8 + 0.6;
                    this.opacity = Math.random() * 0.5 + 0.15;
                    this.hue = Math.random() < 0.4 ? 220 + Math.random() * 60   // blue
                              : Math.random() < 0.5 ? 260 + Math.random() * 40  // purple
                              : 160 + Math.random() * 40; // teal
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;

                    // 鼠标吸引
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 180) {
                        const force = (180 - dist) / 180;
                        this.vx += (dx / dist) * force * 0.02;
                        this.vy += (dy / dist) * force * 0.02;
                    }

                    // 速度阻尼
                    this.vx *= 0.999;
                    this.vy *= 0.999;
                    // 速度上限
                    const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                    if (speed > 1.2) {
                        this.vx = (this.vx / speed) * 1.2;
                        this.vy = (this.vy / speed) * 1.2;
                    }

                    // 边界回环
                    if (this.x < -30) this.x = canvas.width + 30;
                    if (this.x > canvas.width + 30) this.x = -30;
                    if (this.y < -30) this.y = canvas.height + 30;
                    if (this.y > canvas.height + 30) this.y = -30;
                }
                draw(ctx) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${this.hue}, 60%, 65%, ${this.opacity})`;
                    ctx.fill();
                }
            }

            // 初始化粒子
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles.push(new Particle());
            }

            // 鼠标跟踪
            document.addEventListener('mousemove', (e) => {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
            });
            document.addEventListener('mouseleave', () => {
                mouse.x = -999;
                mouse.y = -999;
            });

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // 更新和绘制粒子
                particles.forEach(p => { p.update(); p.draw(ctx); });

                // 绘制连线
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 120) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            const lineAlpha = (1 - dist / 120) * 0.08;
                            ctx.strokeStyle = `rgba(100,140,255,${lineAlpha})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }

                requestAnimationFrame(animate);
            }

            animate();
        }

        // ==================== 鼠标光晕 ====================
        function initCursorGlow() {
            const glow = document.getElementById('cursorGlow');
            document.addEventListener('mousemove', (e) => {
                glow.style.left = e.clientX + 'px';
                glow.style.top = e.clientY + 'px';
                glow.style.opacity = '1';
            });
            document.addEventListener('mouseleave', () => {
                glow.style.opacity = '0';
            });
        }

        // ==================== 卡片 tilt 效果 ====================
        function initCardTilt() {
            document.addEventListener('mousemove', (e) => {
                document.querySelectorAll('.tool-card:hover').forEach(card => {
                    const rect = card.getBoundingClientRect();
                    const x = (e.clientX - rect.left) / rect.width - 0.5;
                    const y = (e.clientY - rect.top) / rect.height - 0.5;
                    card.style.transform = `translateY(-8px) perspective(800px) rotateY(${x * 6}deg) rotateX(${-y * 4}deg)`;
                });
            });
            document.addEventListener('mouseleave', () => {
                document.querySelectorAll('.tool-card').forEach(card => {
                    card.style.transform = '';
                });
            }, true);
        }

        // ==================== 启动 ====================
        renderTools();
        initParticles();
        initCursorGlow();
        initCardTilt();
    </script>
</body>
</html>
