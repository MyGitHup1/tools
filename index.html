<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tools - 在线工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        /* ================================================================
           赛博朋克主题 (默认)
           ================================================================ */
        :root {
            --bg: #0a0a0f;
            --card-bg: rgba(15, 15, 25, 0.85);
            --card-bg-solid: #0f0f19;
            --border: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(255, 255, 255, 0.15);
            --text: #e0e0e0;
            --text-dim: #8888a0;
            --tag-bg: rgba(255, 255, 255, 0.04);
            --tag-border: rgba(255, 255, 255, 0.06);
            --tag-border-hover: rgba(255, 255, 255, 0.15);
            --stat-bg: rgba(255, 255, 255, 0.03);
            --stat-border: rgba(255, 255, 255, 0.05);
            --footer-text: #555;
            --footer-border: rgba(255, 255, 255, 0.04);
            --card-glow-opacity: 0.15;
            --card-shadow: 0 15px 40px rgba(0,0,0,0.4);
            --card-hover-y: -8px;
            --hero-grad-1: rgba(120,80,255,0.15);
            --hero-grad-2: rgba(0,180,255,0.12);
            --hero-grad-3: rgba(255,80,180,0.08);
            --title-grad-1: #c084fc;
            --title-grad-2: #60a5fa;
            --title-grad-3: #34d399;
            --hover-arrow-color: var(--card-accent, #60a5fa);
            --card-name-color: #e8e8f0;
            --card-blur: 20px;
        }

        /* ================================================================
           少女心主题
           ================================================================ */
        body.theme-kawaii {
            --bg: linear-gradient(135deg, #fef5f9 0%, #fdf2f8 25%, #faf5ff 50%, #f0f9ff 75%, #fef5f9 100%);
            --card-bg: rgba(255, 255, 255, 0.75);
            --card-bg-solid: #ffffff;
            --border: rgba(236, 72, 153, 0.15);
            --border-hover: rgba(236, 72, 153, 0.35);
            --text: #4a2c3e;
            --text-dim: #b0849b;
            --tag-bg: rgba(236, 72, 153, 0.08);
            --tag-border: rgba(236, 72, 153, 0.12);
            --tag-border-hover: rgba(236, 72, 153, 0.3);
            --stat-bg: rgba(255, 255, 255, 0.6);
            --stat-border: rgba(236, 72, 153, 0.15);
            --footer-text: #c4a0b4;
            --footer-border: rgba(236, 72, 153, 0.1);
            --card-glow-opacity: 0.08;
            --card-shadow: 0 8px 30px rgba(236, 72, 153, 0.12);
            --card-hover-y: -6px;
            --hero-grad-1: rgba(236,72,153,0.12);
            --hero-grad-2: rgba(168,85,247,0.1);
            --hero-grad-3: rgba(251,146,60,0.08);
            --title-grad-1: #ec4899;
            --title-grad-2: #a855f7;
            --title-grad-3: #fb923c;
            --hover-arrow-color: #ec4899;
            --card-name-color: #3b1f30;
            --card-blur: 12px;
        }

        /* ================================================================
           通用基础
           ================================================================ */
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            overflow-x: hidden;
            color: var(--text);
            transition: color 0.6s;
        }
        body.theme-cyberpunk { background: var(--bg); }
        body.theme-kawaii {
            background: linear-gradient(135deg, #fef5f9 0%, #fdf2f8 25%, #faf5ff 50%, #f0f9ff 75%, #fef5f9 100%);
            background-attachment: fixed;
        }

        /* ======== Canvas 粒子背景 ======== */
        #particleCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        /* ======== 鼠标光晕 ======== */
        .cursor-glow {
            position: fixed;
            width: 300px; height: 300px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            transform: translate(-50%, -50%);
            transition: opacity 0.4s;
        }
        body.theme-cyberpunk .cursor-glow {
            background: radial-gradient(circle, rgba(100, 130, 255, 0.12) 0%, transparent 70%);
        }
        body.theme-kawaii .cursor-glow {
            background: radial-gradient(circle, rgba(236, 72, 153, 0.08) 0%, transparent 70%);
        }

        /* ======== Hero 区块 ======== */
        .hero-section {
            position: relative;
            z-index: 2;
            padding: 5rem 1rem 4rem;
            text-align: center;
            overflow: hidden;
            transition: all 0.6s;
        }
        .hero-section::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: 
                radial-gradient(ellipse at 30% 20%, var(--hero-grad-1) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 60%, var(--hero-grad-2) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, var(--hero-grad-3) 0%, transparent 50%);
            animation: heroPulse 8s ease-in-out infinite;
            z-index: -1;
            transition: background 0.6s;
        }
        @keyframes heroPulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.08); }
        }

        .hero-title {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, var(--title-grad-1), var(--title-grad-2), var(--title-grad-3));
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleShimmer 4s ease-in-out infinite;
        }
        @keyframes titleShimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .hero-subtitle {
            font-size: 1.1rem;
            max-width: 32rem;
            margin: 1rem auto 0;
            line-height: 1.7;
            color: var(--text-dim);
            transition: color 0.6s;
        }

        .hero-icon {
            width: 64px; height: 64px;
            margin: 0 auto 1.5rem;
            position: relative;
        }
        .hero-icon::after {
            content: '';
            position: absolute;
            inset: -12px;
            border-radius: 50%;
            animation: iconGlow 3s ease-in-out infinite;
            transition: background 0.6s;
        }
        body.theme-cyberpunk .hero-icon::after {
            background: radial-gradient(circle, rgba(139, 92, 246, 0.3), transparent);
        }
        body.theme-kawaii .hero-icon::after {
            background: radial-gradient(circle, rgba(236, 72, 153, 0.2), transparent);
        }
        @keyframes iconGlow {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.3); opacity: 1; }
        }

        /* ======== 工具网格 ======== */
        .main-content {
            position: relative; z-index: 2;
            max-width: 1200px; margin: -3rem auto 0;
            padding: 0 1.5rem 4rem;
        }
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.25rem;
        }

        /* ======== 卡片 ======== */
        .tool-card {
            position: relative;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden;
            backdrop-filter: blur(var(--card-blur));
            -webkit-backdrop-filter: blur(var(--card-blur));
        }
        .tool-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            padding: 1px;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.5s;
        }
        body.theme-cyberpunk .tool-card::before {
            background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02), rgba(255,255,255,0.08));
        }
        body.theme-kawaii .tool-card::before {
            background: linear-gradient(135deg, rgba(236,72,153,0.18), rgba(168,85,247,0.1), rgba(251,146,60,0.12));
        }
        .tool-card:hover {
            transform: translateY(var(--card-hover-y));
            border-color: var(--border-hover);
            box-shadow: 0 0 30px color-mix(in srgb, var(--card-accent, #60a5fa) var(--card-glow-opacity), transparent),
                        var(--card-shadow);
            background: var(--card-bg-solid);
        }
        .tool-card:hover::before { opacity: 1; }

        /* 赛博: 四角光点 / 少女: 圆角装饰 */
        .card-corner-dot {
            position: absolute;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--card-accent, #60a5fa);
            box-shadow: 0 0 10px var(--card-accent, #60a5fa);
            transition: all 0.5s;
            opacity: 0;
            animation: cornerPulse 3s ease-in-out infinite;
        }
        body.theme-cyberpunk .card-corner-dot { opacity: 0.4; }
        body.theme-kawaii .card-corner-dot {
            width: 8px; height: 8px;
            opacity: 0.25;
            border-radius: 50%;
            box-shadow: 0 0 6px var(--card-accent, #f9a8d4);
        }
        @keyframes cornerPulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.3); }
        }
        .tool-card:hover .card-corner-dot {
            opacity: 1;
            box-shadow: 0 0 20px var(--card-accent, #60a5fa), 0 0 40px var(--card-accent, #60a5fa);
        }
        .card-corner-dot:nth-child(1) { top: 12px; left: 12px; animation-delay: 0s; }
        .card-corner-dot:nth-child(2) { top: 12px; right: 12px; animation-delay: 0.75s; }
        .card-corner-dot:nth-child(3) { bottom: 12px; left: 12px; animation-delay: 1.5s; }
        .card-corner-dot:nth-child(4) { bottom: 12px; right: 12px; animation-delay: 2.25s; }

        /* 卡片图标 */
        .card-icon-wrap {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            flex-shrink: 0;
            transition: all 0.5s;
        }
        body.theme-kawaii .card-icon-wrap {
            border-radius: 16px;
        }
        .card-icon-wrap::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 16px;
            background: var(--card-accent, #60a5fa);
            opacity: 0;
            filter: blur(12px);
            transition: opacity 0.5s;
        }
        .tool-card:hover .card-icon-wrap::after { opacity: 0.4; }

        /* 标签 */
        .tool-tag {
            font-size: 0.7rem;
            padding: 3px 10px;
            border-radius: 999px;
            background: var(--tag-bg);
            border: 1px solid var(--tag-border);
            color: var(--text-dim);
            transition: all 0.4s;
        }
        .tool-card:hover .tool-tag {
            border-color: var(--tag-border-hover);
            color: var(--card-name-color);
        }
        body.theme-kawaii .tool-tag {
            border-radius: 12px;
            font-size: 0.68rem;
        }

        /* 箭头 */
        .card-arrow {
            transition: all 0.4s;
            opacity: 0.3;
            color: var(--text-dim);
        }
        .tool-card:hover .card-arrow {
            opacity: 1;
            transform: translateX(4px);
            color: var(--hover-arrow-color);
        }

        /* 卡片名称 */
        .card-name {
            font-size: 1.05rem;
            font-weight: 600;
            margin: 0;
            transition: color 0.4s;
            color: var(--card-name-color);
        }

        /* ======== 主题切换按钮 ======== */
        .theme-toggle-wrap {
            position: fixed;
            bottom: 24px; right: 24px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }
        .theme-toggle-btn {
            width: 48px; height: 48px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: relative;
        }
        body.theme-cyberpunk .theme-toggle-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #60a5fa;
            box-shadow: 0 0 20px rgba(100, 130, 255, 0.15);
        }
        body.theme-cyberpunk .theme-toggle-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 30px rgba(100, 130, 255, 0.3);
            transform: scale(1.1);
        }
        body.theme-kawaii .theme-toggle-btn {
            background: rgba(255, 255, 255, 0.65);
            border: 1px solid rgba(236, 72, 153, 0.2);
            color: #ec4899;
            box-shadow: 0 4px 20px rgba(236, 72, 153, 0.12);
        }
        body.theme-kawaii .theme-toggle-btn:hover {
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 6px 25px rgba(236, 72, 153, 0.2);
            transform: scale(1.1) rotate(15deg);
        }
        .theme-toggle-tooltip {
            font-size: 0.7rem;
            padding: 5px 12px;
            border-radius: 12px;
            white-space: nowrap;
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.3s;
            pointer-events: none;
        }
        body.theme-cyberpunk .theme-toggle-tooltip {
            background: rgba(255,255,255,0.08);
            color: #888;
            border: 1px solid rgba(255,255,255,0.06);
        }
        body.theme-kawaii .theme-toggle-tooltip {
            background: rgba(255,255,255,0.7);
            color: #b0849b;
            border: 1px solid rgba(236,72,153,0.15);
        }
        .theme-toggle-wrap:hover .theme-toggle-tooltip {
            opacity: 1;
            transform: translateY(0);
        }

        /* ======== 统计条 ======== */
        .stats-bar {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--text-dim);
            transition: color 0.6s;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 1rem;
            background: var(--stat-bg);
            border-radius: 999px;
            border: 1px solid var(--stat-border);
            transition: all 0.4s;
        }
        .stat-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            animation: statBlink 2s ease-in-out infinite;
        }
        body.theme-cyberpunk .stat-dot {
            background: #60a5fa;
            box-shadow: 0 0 6px #60a5fa;
        }
        body.theme-kawaii .stat-dot {
            background: #ec4899;
            box-shadow: 0 0 6px #ec4899;
        }
        @keyframes statBlink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* ======== Footer ======== */
        .site-footer {
            position: relative; z-index: 2;
            text-align: center;
            padding: 2rem 1rem;
            font-size: 0.8rem;
            border-top: 1px solid var(--footer-border);
            color: var(--footer-text);
            transition: all 0.6s;
        }

        /* ======== 滚动入场动画 ======== */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ======== 响应式 ======== */
        @media (max-width: 768px) {
            .tools-grid { grid-template-columns: 1fr; }
            .main-content { margin-top: -2rem; padding: 0 0.75rem 3rem; }
            .theme-toggle-wrap { bottom: 16px; right: 16px; }
            .theme-toggle-btn { width: 42px; height: 42px; font-size: 1.2rem; }
        }
    </style>
</head>
<body class="theme-cyberpunk">

    <!-- 粒子背景 -->
    <canvas id="particleCanvas"></canvas>

    <!-- 鼠标光晕 -->
    <div class="cursor-glow" id="cursorGlow"></div>

    <!-- Hero -->
    <header class="hero-section">
        <div class="hero-icon">
            <svg id="heroIconSvg" width="64" height="64" fill="none" stroke-width="1.5" viewBox="0 0 24 24" style="position:relative;z-index:1">
                <defs>
                    <linearGradient id="heroSvgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#c084fc"/>
                        <stop offset="50%" stop-color="#60a5fa"/>
                        <stop offset="100%" stop-color="#34d399"/>
                    </linearGradient>
                    <linearGradient id="heroSvgKawaii" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#ec4899"/>
                        <stop offset="50%" stop-color="#a855f7"/>
                        <stop offset="100%" stop-color="#fb923c"/>
                    </linearGradient>
                </defs>

        <h1 class="hero-title">My Tools</h1>
        <p class="hero-subtitle">高效在线工具箱 · 所有工具浏览器本地运行 · 数据不外传</p>

        <div class="stats-bar">
            <span class="stat-item"><span class="stat-dot"></span> 6 个工具</span>
            <span class="stat-item" data-emoji="🔒">🔒 本地运行</span>
            <span class="stat-item" data-emoji="⚡">⚡ 即开即用</span>
            <span class="stat-item" data-emoji="🎨">🎨 2026</span>
        </div>
    </header>

    <!-- 工具网格 -->
    <main class="main-content">
        <div class="tools-grid" id="toolsGrid"></div>

        <div id="emptyState" class="hidden" style="text-align:center;padding:4rem 0;">
            <svg width="64" height="64" style="margin:0 auto 1rem;opacity:0.2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/>
            </svg>
            <p style="color:#555;">暂无工具，快去添加吧</p>
        </div>
    </main>

    <footer class="site-footer">
        My Tools &copy; 2026 — 所有工具均在浏览器本地运行，安全可靠
    </footer>

    <!-- 主题切换按钮 -->
    <div class="theme-toggle-wrap">
        <button class="theme-toggle-btn" id="themeToggle" title="切换主题" aria-label="切换主题">
            <span id="themeToggleIcon">🌸</span>
        </button>
        <span class="theme-toggle-tooltip" id="themeToggleLabel">切换到少女心</span>
    </div>

    <script>
        // ==================== 工具注册表 ====================
        const tools = [
            {

                path: "tools/color-picker/index.html",
                accent: "#c084fc",
                kawaiiAccent: "#d8b4fe",
                tags: ["颜色", "取色", "设计"]
            },
            {
                name: "二维码生成器",
                desc: "输入文字或链接实时生成二维码，支持尺寸/颜色/纠错级别调节、Wi-Fi/名片等快捷模板，可下载 PNG",
                icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2.48a2.5 2.5 0 00-4.52 0H4m16 0v-4a2 2 0 00-2-2h-1.5m2 6H20M4 15v-4a2 2 0 012-2h1.5M4 15h1.5M12 9v4m-4-6h8M8 3v2m8-2v2"/>',
                path: "tools/qrcode-generator/index.html",

                tags: ["二维码", "生成", "分享"]
            },
            {
                name: "JSON 格式化工具",
                desc: "在线 JSON 格式化/压缩/校验，语法高亮、Key 排序、自定义缩进、节点统计，Ctrl+Enter 快捷格式化",
                icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>',
                path: "tools/json-formatter/index.html",
                accent: "#f59e0b",
                kawaiiAccent: "#fcd34d",
                tags: ["JSON", "格式化", "开发"]
            },
            {
                name: "高压电源设计工具箱",
                desc: "硬件工程师专属：分压器设计(自动算串联数/功耗)、RC充放电曲线、功率热耗散结温、电容储能TNT当量",
                icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>',
                path: "tools/hv-design/index.html",
                accent: "#f87171",
                kawaiiAccent: "#fca5a5",
                tags: ["高压", "分压器", "RC", "硬件"]
            },
            {
                name: "BOM 整理工具",
                desc: "粘贴物料清单自动分类(电阻/电容/IC等19类)、排序筛选、统计概览，支持导出CSV/Excel和复制表格",
                icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"/>',
                path: "tools/bom-organizer/index.html",
                accent: "#2dd4bf",
                kawaiiAccent: "#99f6e4",
                tags: ["BOM", "物料", "硬件"]
            }
        ];

        // ==================== 主题管理 ====================
        let currentTheme = 'cyberpunk'; // 'cyberpunk' | 'kawaii'
        let themeSwitchCooldown = false;

        function setTheme(theme) {
            if (themeSwitchCooldown || theme === currentTheme) return;
            themeSwitchCooldown = true;

            const body = document.body;
            body.classList.remove('theme-cyberpunk', 'theme-kawaii');
            body.classList.add('theme-' + theme);
            currentTheme = theme;

            // 更新切换按钮
            const toggleIcon = document.getElementById('themeToggleIcon');
            const toggleLabel = document.getElementById('themeToggleLabel');
            const heroSvg = document.getElementById('heroIconSvg').querySelector('path');

            if (theme === 'kawaii') {
                toggleIcon.textContent = '💜';
                toggleLabel.textContent = '切换到赛博朋克';
                heroSvg.setAttribute('stroke', 'url(#heroSvgKawaii)');
            } else {
                toggleIcon.textContent = '🌸';
                toggleLabel.textContent = '切换到少女心';
                heroSvg.setAttribute('stroke', 'url(#heroSvgGrad)');
            }

            // 更新卡片 accent 颜色
            updateCardAccents();

            // 重启粒子
            if (window._animFrame) cancelAnimationFrame(window._animFrame);
            particles = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());
            if (window._animFrame) animateParticles();

            // 更新光晕
            initCursorGlow();

            // 保存主题
            try { localStorage.setItem('tools-theme', theme); } catch(e) {}

            setTimeout(() => { themeSwitchCooldown = false; }, 600);
        }

        function updateCardAccents() {
            document.querySelectorAll('.tool-card').forEach((card, i) => {
                const tool = tools[i];
                const accent = currentTheme === 'kawaii' ? tool.kawaiiAccent : tool.accent;
                card.style.setProperty('--card-accent', accent);
                card.style.setProperty('--card-glow', accent + (currentTheme === 'kawaii' ? '22' : '33'));
                card.querySelectorAll('.card-corner-dot').forEach(dot => {
                    dot.style.background = accent;
                    dot.style.boxShadow = '0 0 10px ' + accent;
                });
            });
        }

        // 切换按钮
        document.getElementById('themeToggle').addEventListener('click', () => {
            setTheme(currentTheme === 'cyberpunk' ? 'kawaii' : 'cyberpunk');
        });

        // 恢复上次主题
        function restoreTheme() {
            try {
                const saved = localStorage.getItem('tools-theme');
                if (saved && (saved === 'kawaii' || saved === 'cyberpunk')) {
                    document.body.classList.remove('theme-cyberpunk');
                    document.body.classList.add('theme-' + saved);
                    currentTheme = saved;
                    const toggleIcon = document.getElementById('themeToggleIcon');
                    const toggleLabel = document.getElementById('themeToggleLabel');
                    const heroSvg = document.getElementById('heroIconSvg').querySelector('path');
                    if (saved === 'kawaii') {
                        toggleIcon.textContent = '💜';
                        toggleLabel.textContent = '切换到赛博朋克';
                        heroSvg.setAttribute('stroke', 'url(#heroSvgKawaii)');
                    }
                }
            } catch(e) {}
        }

        // ==================== 渲染卡片 ====================
        function renderTools() {
            const grid = document.getElementById('toolsGrid');
            const emptyState = document.getElementById('emptyState');

            if (tools.length === 0) {
                grid.style.display = 'none';
                emptyState.classList.remove('hidden');
                return;
            }

            grid.style.display = '';
            emptyState.classList.add('hidden');

            const accentAttr = currentTheme === 'kawaii' ? 'kawaiiAccent' : 'accent';

            grid.innerHTML = tools.map((tool, i) => `
                <a href="${tool.path}" class="tool-card reveal"
                   style="--card-accent: ${tool[accentAttr]}; --card-glow: ${tool[accentAttr]}${currentTheme === 'kawaii' ? '22' : '33'}; transition-delay: ${i * 0.06}s">
                    <span class="card-corner-dot" style="background:${tool[accentAttr]};box-shadow:0 0 10px ${tool[accentAttr]}"></span>
                    <span class="card-corner-dot" style="background:${tool[accentAttr]};box-shadow:0 0 10px ${tool[accentAttr]}"></span>
                    <span class="card-corner-dot" style="background:${tool[accentAttr]};box-shadow:0 0 10px ${tool[accentAttr]}"></span>
                    <span class="card-corner-dot" style="background:${tool[accentAttr]};box-shadow:0 0 10px ${tool[accentAttr]}"></span>

                    <div style="display:flex;align-items:flex-start;gap:1rem;">
                        <div class="card-icon-wrap" style="background:${tool[accentAttr]}22;color:${tool[accentAttr]}">
                            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                ${tool.icon}
                            </svg>
                        </div>
                        <div style="flex:1;min-width:0;">
                            <div style="display:flex;align-items:center;justify-content:space-between;">
                                <h3 class="card-name">${tool.name}</h3>
                                <svg class="card-arrow" width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="flex-shrink:0;">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
                                </svg>
                            </div>
                            <p style="font-size:0.8rem;color:var(--text-dim);line-height:1.5;margin:0.5rem 0 0.75rem;transition:color 0.4s;">${tool.desc}</p>
                            <div style="display:flex;flex-wrap:wrap;gap:6px;">
                                ${tool.tags.map(tag => `<span class="tool-tag">${tag}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                </a>
            `).join('');

            observeReveal();
        }

        // ==================== 滚动入场动画 ====================
        function observeReveal() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        }

        // ==================== 粒子背景 ====================
        const PARTICLE_COUNT = 120;
        let particles = [];
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let mouse = { x: -999, y: -999 };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // 少女心形状绘制
        function drawHeart(cx, cy, size) {
            ctx.beginPath();
            const s = size * 1.2;
            ctx.moveTo(cx, cy + s * 0.3);
            ctx.bezierCurveTo(cx, cy, cx - s, cy, cx - s, cy - s * 0.4);
            ctx.bezierCurveTo(cx - s, cy - s * 0.9, cx - s * 0.4, cy - s, cx, cy - s * 0.4);
            ctx.bezierCurveTo(cx + s * 0.4, cy - s, cx + s, cy - s * 0.9, cx + s, cy - s * 0.4);
            ctx.bezierCurveTo(cx + s, cy, cx, cy, cx, cy + s * 0.3);
            ctx.closePath();
        }

        function drawStar(cx, cy, size) {
            ctx.beginPath();
            const spikes = 5;
            const outer = size * 1.3;
            const inner = size * 0.5;
            for (let i = 0; i < spikes * 2; i++) {
                const r = i % 2 === 0 ? outer : inner;
                const angle = (Math.PI * 2 * i) / (spikes * 2) - Math.PI / 2;
                const x = cx + Math.cos(angle) * r;
                const y = cy + Math.sin(angle) * r;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
        }

        function drawSparkle(cx, cy, size) {
            ctx.beginPath();
            const len = size * 2;
            // 四角星
            for (let i = 0; i < 4; i++) {
                const angle = (Math.PI / 2) * i;
                const x1 = cx + Math.cos(angle) * len;
                const y1 = cy + Math.sin(angle) * len;
                const xm = cx + Math.cos(angle + 0.3) * len * 0.35;
                const ym = cy + Math.sin(angle + 0.3) * len * 0.35;
                ctx.moveTo(cx, cy);
                ctx.lineTo(xm, ym);
                ctx.lineTo(x1, y1);
                ctx.lineTo(cx + Math.cos(angle - 0.3) * len * 0.35, cy + Math.sin(angle - 0.3) * len * 0.35);
                ctx.lineTo(cx, cy);
            }
            ctx.closePath();
        }

        class Particle {
            constructor() {
                this.reset(true);
            }
            reset(init = false) {
                this.x = init ? Math.random() * canvas.width : (Math.random() < 0.5 ? -30 : canvas.width + 30);
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.6;
                this.vy = (Math.random() - 0.5) * 0.4;
                this.size = Math.random() * 2 + 0.8;
                this.opacity = Math.random() * 0.45 + 0.12;
                this.rotSpeed = (Math.random() - 0.5) * 0.03;
                this.rotation = Math.random() * Math.PI * 2;

                if (currentTheme === 'kawaii') {
                    this.shape = Math.random() < 0.45 ? 'heart' : (Math.random() < 0.5 ? 'star' : 'sparkle');
                    this.hue = Math.random() < 0.35 ? 330 + Math.random() * 30   // pink
                              : Math.random() < 0.5 ? 270 + Math.random() * 30  // purple
                              : Math.random() < 0.5 ? 30 + Math.random() * 20   // peach/orange
                              : 190 + Math.random() * 30; // mint
                    this.size = Math.random() * 4 + 2;
                } else {
                    this.shape = 'dot';
                    this.hue = Math.random() < 0.4 ? 220 + Math.random() * 60
                              : Math.random() < 0.5 ? 260 + Math.random() * 40
                              : 160 + Math.random() * 40;
                    this.size = Math.random() * 1.8 + 0.6;
                }
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.rotation += this.rotSpeed;

                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 180) {
                    const force = (180 - dist) / 180;
                    this.vx += (dx / dist) * force * 0.02;
                    this.vy += (dy / dist) * force * 0.02;
                }

                this.vx *= 0.999;
                this.vy *= 0.999;
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed > 1.5) {
                    this.vx = (this.vx / speed) * 1.5;
                    this.vy = (this.vy / speed) * 1.5;
                }

                if (this.x < -50) this.x = canvas.width + 50;
                if (this.x > canvas.width + 50) this.x = -50;
                if (this.y < -50) this.y = canvas.height + 50;
                if (this.y > canvas.height + 50) this.y = -50;
            }
            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.fillStyle = `hsla(${this.hue}, 60%, ${currentTheme === 'kawaii' ? '75' : '65'}%, ${this.opacity})`;

                if (this.shape === 'heart') {
                    drawHeart(0, 0, this.size);
                    ctx.fill();
                } else if (this.shape === 'star') {
                    drawStar(0, 0, this.size);
                    ctx.fill();
                } else if (this.shape === 'sparkle') {
                    drawSparkle(0, 0, this.size);
                    ctx.fill();
                } else {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        function initParticles() {
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(ctx); });

            // 连线（仅赛博主题）
            if (currentTheme === 'cyberpunk') {
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 120) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(100,140,255,${(1 - dist / 120) * 0.08})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }
            }

            window._animFrame = requestAnimationFrame(animateParticles);
        }

        // ==================== 鼠标光晕 ====================
        function initCursorGlow() {
            // stored as event handler ref
        }
        document.addEventListener('mousemove', (e) => {
            const glow = document.getElementById('cursorGlow');
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
            glow.style.opacity = '1';
        });
        document.addEventListener('mouseleave', () => {
            document.getElementById('cursorGlow').style.opacity = '0';
        });

        // ==================== 卡片 tilt 效果 ====================
        function initCardTilt() {
            document.addEventListener('mousemove', (e) => {
                document.querySelectorAll('.tool-card:hover').forEach(card => {
                    const rect = card.getBoundingClientRect();
                    const x = (e.clientX - rect.left) / rect.width - 0.5;
                    const y = (e.clientY - rect.top) / rect.height - 0.5;
                    const tiltIntensity = currentTheme === 'kawaii' ? 3 : 6;
                    card.style.transform = `translateY(${currentTheme === 'kawaii' ? '-6px' : '-8px'}) perspective(800px) rotateY(${x * tiltIntensity}deg) rotateX(${-y * 4}deg)`;
                });
            });
            document.addEventListener('mouseleave', () => {
                document.querySelectorAll('.tool-card').forEach(card => { card.style.transform = ''; });
            }, true);
        }

        // ==================== 启动 ====================
        restoreTheme();
        renderTools();
        initParticles();
        animateParticles();
        initCardTilt();
    </script>
</body>
</html>
