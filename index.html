<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tools - 在线工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .tool-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .tool-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
        }
        .hero-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .icon-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Hero Header -->
    <header class="hero-gradient text-white py-16 px-4">
        <div class="max-w-5xl mx-auto text-center">
            <div class="flex items-center justify-center mb-4">
                <svg class="w-12 h-12 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/>
                </svg>
                <h1 class="text-4xl md:text-5xl font-bold tracking-tight">My Tools</h1>
            </div>
            <p class="text-lg md:text-xl opacity-90 max-w-2xl mx-auto">简洁高效的在线工具箱，所有工具在浏览器本地运行，无需上传文件到服务器</p>
        </div>
    </header>

    <!-- Tools Grid -->
    <main class="max-w-5xl mx-auto px-4 -mt-8 pb-16">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="toolsGrid">
            <!-- 工具卡片会通过 JS 动态渲染 -->
        </div>

        <!-- 空状态提示 -->
        <div id="emptyState" class="hidden text-center py-20">
            <svg class="w-16 h-16 mx-auto text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/>
            </svg>
            <p class="text-gray-400 text-lg">暂无工具</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="text-center text-gray-400 text-sm py-8 border-t border-gray-200">
        <p>My Tools &copy; 2026 &mdash; 所有工具均在浏览器本地运行，安全可靠</p>
    </footer>

    <script>
        /**
         * ========================================
         *  工具注册表 - 添加新工具只需在此处添加一条记录
         * ========================================
         *
         *  添加新工具的步骤：
         *  1. 在 tools/ 目录下创建新文件夹，如 tools/my-tool/
         *  2. 在文件夹中创建 index.html
         *  3. 在下方 tools 数组中添加一条记录
         *
         *  字段说明：
         *  - name:     工具名称
         *  - desc:     工具简介
         *  - icon:     SVG 图标路径 (viewBox="0 0 24 24")
         *  - path:     相对于首页的路径
         *  - color:    卡片图标背景色 (Tailwind 类名)
         *  - tags:     标签数组
         */
        const tools = [
            {
                name: "文件 Hash 两两对比",
                desc: "批量上传文件，计算 MD5/SHA-1/SHA-256 哈希值，并自动进行两两对比，快速找出重复文件",
                icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>',
                path: "tools/hash-compare/index.html",
                color: "from-blue-500 to-blue-600",
                tags: ["文件", "哈希", "对比"]
            },
            {
                name: "取色器",
                desc: "可视化拾取颜色，支持色相/饱和度/明度调节、透明度控制、HEX/RGB/HSL 格式切换，支持屏幕取色和颜色历史记录",
                icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"/>',
                path: "tools/color-picker/index.html",
                color: "from-purple-500 to-pink-500",
                tags: ["颜色", "取色", "设计"]
            },
            {
                name: "二维码生成器",
                desc: "输入文字或链接实时生成二维码，支持尺寸/颜色/纠错级别调节、Wi-Fi/名片等快捷模板，可下载 PNG 或复制图片",
                icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2.48a2.5 2.5 0 00-4.52 0H4m16 0v-4a2 2 0 00-2-2h-1.5m2 6H20M4 15v-4a2 2 0 012-2h1.5M4 15h1.5M12 9v4m-4-6h8M8 3v2m8-2v2"/>',
                path: "tools/qrcode-generator/index.html",
                color: "from-indigo-500 to-indigo-600",
                tags: ["二维码", "生成", "分享"]
            },
            {
                name: "JSON 格式化工具",
                desc: "在线 JSON 格式化/压缩/校验，支持语法高亮、Key 排序、自定义缩进、节点统计，Ctrl+Enter 快捷格式化",
                icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>',
                path: "tools/json-formatter/index.html",
                color: "from-amber-500 to-orange-500",
                tags: ["JSON", "格式化", "开发"]
            }
            // ─────────────────────────────────────
            // 在此处添加更多工具，格式如下：
            // {
            //     name: "工具名称",
            //     desc: "工具简介描述",
            //     icon: '<path .../>',
            //     path: "tools/your-tool/index.html",
            //     color: "from-green-500 to-green-600",
            //     tags: ["标签1", "标签2"]
            // }
            // ─────────────────────────────────────
        ];

        // 渲染工具卡片
        function renderTools() {
            const grid = document.getElementById('toolsGrid');
            const emptyState = document.getElementById('emptyState');

            if (tools.length === 0) {
                grid.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            grid.classList.remove('hidden');
            emptyState.classList.add('hidden');

            grid.innerHTML = tools.map(tool => `
                <a href="${tool.path}" class="tool-card block bg-white rounded-xl shadow-md overflow-hidden group">
                    <div class="p-6">
                        <div class="flex items-start justify-between mb-4">
                            <div class="icon-bg w-12 h-12 rounded-lg flex items-center justify-center text-white shadow-lg">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    ${tool.icon}
                                </svg>
                            </div>
                            <svg class="w-5 h-5 text-gray-300 group-hover:text-blue-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                            </svg>
                        </div>
                        <h3 class="text-lg font-semibold text-gray-800 mb-2 group-hover:text-blue-600 transition-colors">${tool.name}</h3>
                        <p class="text-sm text-gray-500 leading-relaxed mb-4">${tool.desc}</p>
                        <div class="flex flex-wrap gap-2">
                            ${tool.tags.map(tag => `<span class="text-xs px-2 py-1 bg-gray-100 text-gray-500 rounded-full">${tag}</span>`).join('')}
                        </div>
                    </div>
                </a>
            `).join('');
        }

        renderTools();
    </script>
</body>
</html>
